<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 智能生产线系统</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; } 
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0b0f19; color: #e2e8f0; margin: 0; padding: 10px 15px; min-height: 100vh; display: flex; flex-direction: column; overflow-y: auto; }
        h1 { text-align: center; color: #00e5ff; text-shadow: 0 0 15px rgba(0, 229, 255, 0.6); letter-spacing: 3px; margin: 0 0 10px 0; font-size: 26px; flex-shrink: 0; }
        .pmc-header { color: #f472b6 !important; text-shadow: 0 0 15px rgba(244, 114, 182, 0.6) !important; }
        .mega-order-display { text-align: center; font-size: 24px; font-weight: bold; color: #facc15; text-shadow: 0 0 15px rgba(250, 204, 21, 0.6); margin-bottom: 10px; letter-spacing: 2px; display: none; background: rgba(250, 204, 21, 0.1); padding: 8px; border-radius: 8px; border: 2px solid rgba(250, 204, 21, 0.3); flex-shrink: 0; }
        .panel { background: rgba(30, 41, 59, 0.8); border: 1px solid #334155; padding: 12px 15px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.5); margin-bottom: 10px; flex-shrink: 0; }
        .input-row { display: flex; flex-wrap: wrap; gap: 15px; align-items: center; margin-bottom: 10px; }
        .form-group { display: flex; align-items: center; gap: 8px; }
        .form-group label { font-weight: bold; color: #94a3b8; font-size: 15px; white-space: nowrap; } 
        input[type="number"], input[type="time"], input[type="text"], input[type="date"], input[type="password"], select { background-color: #0f172a; color: #00e5ff; border: 2px solid #38bdf8; padding: 6px 10px; border-radius: 6px; font-size: 16px; font-weight: bold; outline: none; text-transform: uppercase; }
        input:focus, select:focus { border-color: #00e5ff; box-shadow: 0 0 12px rgba(0, 229, 255, 0.8); }
        input:disabled, select:disabled { background-color: #1e293b !important; color: #64748b !important; border-color: #475569 !important; cursor: not-allowed; -webkit-text-fill-color: #64748b !important;}
        .short-input { width: 110px; } .long-input { width: 150px; }
        select option { background-color: #0f172a; color: #e2e8f0; } select optgroup { color: #38bdf8; }
        .action-buttons { display: flex; align-items: center; gap: 10px; flex-grow: 1; justify-content: flex-end; flex-wrap: wrap; }
        button { padding: 6px 15px; font-size: 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: #fff; text-transform: uppercase; transition: all 0.3s ease; letter-spacing: 1px; }
        .btn-fetch { background: linear-gradient(135deg, #8b5cf6, #6d28d9); box-shadow: 0 0 10px rgba(139, 92, 246, 0.5); }
        .btn-publish { background: linear-gradient(135deg, #f472b6, #be185d); box-shadow: 0 0 15px rgba(244, 114, 182, 0.6); font-size: 18px; padding: 10px 20px;}
        .btn-start { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
        .btn-stop { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .btn-end { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .btn-reset { background: linear-gradient(135deg, #64748b, #475569); }
        .status-text { font-size: 15px; color: #94a3b8; font-weight: bold; margin-left: 10px; }
        .dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; flex-grow: 1; min-height: 250px; margin-top: 10px;}
        .card { background: rgba(30, 41, 59, 0.6); border: 1px solid #334155; padding: 15px; border-radius: 12px; position: relative; overflow: hidden; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center;}
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 6px; }
        .dashboard .card:nth-child(1)::before { background: #38bdf8; }
        .dashboard .card:nth-child(2)::before { background: #8b5cf6; }
        .card h2 { margin-top: 0; font-size: 20px; color: #cbd5e1; margin-bottom: 10px;}
        .time-value { color: #38bdf8; font-size: 50px; font-weight: bold; font-family: 'Courier New', monospace; }
        .time-unit { font-size: 20px; }
        
        /* 🚀 巡线打卡输入区 */
        .patrol-entry { background: rgba(139, 92, 246, 0.1); border: 2px dashed #8b5cf6; padding: 20px; border-radius: 10px; margin-top: 15px; text-align: center;}
        .patrol-input { font-size: 40px; text-align: center; width: 200px; padding: 10px; color: #8b5cf6; background: #0f172a; border: 3px solid #8b5cf6; border-radius: 10px; font-weight: bold; }
        .btn-submit-patrol { background: linear-gradient(135deg, #8b5cf6, #6d28d9); font-size: 24px; padding: 15px 30px; margin-top: 15px; width: 100%; box-shadow: 0 0 20px rgba(139, 92, 246, 0.5);}
        .last-update-hint { color: #10b981; font-weight: bold; margin-top: 10px; font-size: 16px; display: none;}

        .pmc-table-container { background: rgba(30, 41, 59, 0.6); border-radius: 10px; border: 1px solid #334155; padding: 15px; margin-top: 15px;}
        .pmc-table-container h3 { color: #f472b6; margin-top: 0; font-size: 20px; border-bottom: 1px solid #475569; padding-bottom: 10px;}
        table { width: 100%; border-collapse: collapse; text-align: center; }
        th { background-color: #1e293b; color: #94a3b8; padding: 10px; border-bottom: 2px solid #f472b6; }
        td { padding: 10px; border-bottom: 1px solid #334155; color: #e2e8f0; }

        @media (max-width: 900px) {
            .input-row { flex-direction: column; align-items: stretch; gap: 12px; }
            .form-group { flex-direction: row; align-items: center; gap: 10px; width: 100%; justify-content: space-between; }
            .form-group label { margin-bottom: 0; white-space: normal; max-width: 45%; flex-shrink: 0; text-align: left; }
            .form-group input, .form-group select { flex: 1; width: 10% !important; }
            .action-buttons { flex-direction: column; align-items: stretch; margin-top: 10px; }
            .action-buttons button { width: 100%; padding: 12px; margin-bottom: 5px; font-size: 18px;}
            .dashboard { grid-template-columns: 1fr; }
        }

        #authOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #0b0f19; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .auth-box { background: rgba(30, 41, 59, 0.9); border: 2px solid #38bdf8; padding: 30px 40px; border-radius: 15px; box-shadow: 0 0 30px rgba(56, 189, 248, 0.3); text-align: center; }
        .auth-box h2 { color: #00e5ff; margin-top: 0; font-size: 28px; letter-spacing: 2px; }
        .auth-box input { font-size: 24px; letter-spacing: 5px; width: 220px; text-align: center; margin: 15px 0; }
        .auth-box button { font-size: 20px; padding: 10px 40px; width: 100%; margin-bottom: 10px;}
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="auth-box">
            <h2 id="authTitle">🔒 智能系统登入</h2>
            <p style="color: #cbd5e1;">请输入您的专属通行码</p>
            <input type="password" id="pinInput" placeholder="请输入密码">
            <br>
            <button class="btn-bulk" onclick="verifyPIN()">登入系统</button>
            <p id="pinError" style="color: #ef4444; display: none; margin-top: 10px; font-weight: bold;">❌ 密码错误</p>
        </div>
    </div>

    <h1 id="mainTitle">⚡ 智能生产线系统 ⚡</h1>
    <div id="megaOrderDisplay" class="mega-order-display"></div>

    <div class="panel">
        <div class="input-row">
            <div class="form-group"><label>📅 柬埔寨日期:</label><input type="date" id="dateInput" class="long-input"></div>
            <div class="form-group"><label>🏭 工厂:</label>
                <select id="factoryInput" class="short-input"><option value="" disabled selected>请选择...</option><option value="LY">LY</option><option value="LFY">LFY</option></select>
            </div>
            <div class="form-group"><label>🏭 线别:</label>
                <select id="lineInput" class="short-input" style="width: 140px;">
                    <option value="" disabled selected>请选择...</option>
                    <optgroup label="成型"><option value="成型A">成型A</option><option value="成型B">成型B</option><option value="成型C">成型C</option><option value="成型D">成型D</option><option value="成型E">成型E</option><option value="成型F">成型F</option></optgroup>
                    <optgroup label="针车"><option value="针车1">针车1</option><option value="针车2">针车2</option><option value="针车3">针车3</option><option value="针车4">针车4</option><option value="针车5">针车5</option><option value="针车6">针车6</option><option value="针车7">针车7</option><option value="针车8">针车8</option><option value="针车9">针车9</option><option value="针车10">针车10</option><option value="针车11">针车11</option><option value="针车12">针车12</option><option value="针车13">针车13</option><option value="针车14">针车14</option><option value="针车15">针车15</option><option value="针车16">针车16</option><option value="针车17">针车17</option><option value="针车18">针车18</option><option value="针车19">针车19</option><option value="针车20">针车20</option><option value="针车21">针车21</option><option value="针车22">针车22</option><option value="针车23">针车23</option><option value="针车24">针车24</option></optgroup>
                    <optgroup label="组底"><option value="组底1">组底1</option><option value="组底2">组底2</option><option value="组底3">组底3</option><option value="组底4">组底4</option><option value="组底5">组底5</option></optgroup>
                </select>
            </div>
            <div class="form-group" id="workerFetchGroup">
                <button class="btn-fetch" onclick="fetchPlan()">🔍 获取当日排产</button>
            </div>
        </div>
        
        <div class="input-row">
            <div class="form-group"><label>🏷️ 品牌:</label><input type="text" id="brandInput" class="long-input"></div>
            <div class="form-group"><label>📄 单号:</label><input type="text" id="orderInput" class="long-input"></div>
            <div class="form-group"><label>⏱️ 开工时间:</label><input type="time" id="startTimeInput" class="short-input"></div>
            <div class="form-group"><label>📈 本日100%POH:</label><input type="number" id="poh" class="short-input" step="0.01" min="0"></div>
            <div class="form-group"><label>👥 配备人数:</label><input type="number" id="workers" class="short-input" min="1"></div>
        </div>

        <div class="input-row" style="margin-top: 15px; border-top: 1px dashed #334155; padding-top: 15px;">
            <div class="action-buttons" id="pmcControls" style="display: none; justify-content: center; width: 100%;">
                <button class="btn-publish" onclick="publishPlan()">💾 锁定并发布排产至车间</button>
                <button class="btn-reset" onclick="location.reload()" style="margin-left: 20px;">🔄 清空重填</button>
            </div>

            <div class="action-buttons" id="workerControls" style="display: none;">
                <button class="btn-start" id="startBtn" onclick="startProduction()" disabled style="opacity: 0.5;">▶️ 开始生产</button>
                <button class="btn-stop" id="pauseBtn" onclick="togglePause()" disabled style="opacity: 0.5;">⏸️ 暂停</button>
                <button class="btn-end" id="endBtn" onclick="endProduction()" disabled style="opacity: 0.5;">⏹️ 结束</button>
                <button class="btn-reset" onclick="resetProduction()">🗑️ 清除</button>
                <span class="status-text" id="statusText">系统状态：请先获取排产</span>
            </div>
        </div>
    </div>

    <div id="pmcDashboardArea" class="pmc-table-container" style="display: none;">
        <h3>📋 该日期已排产清单</h3>
        <table>
            <thead><tr><th>工厂 - 线别</th><th>品牌 (单号)</th><th>POH</th><th>人数</th><th>状态</th></tr></thead>
            <tbody id="pmcPlanListBody"><tr><td colspan="5">⏳ 载入中...</td></tr></tbody>
        </table>
    </div>

    <div id="productionDashboardArea" style="display: none;">
        <div class="dashboard">
            <div class="card"><h2>⏱️ 产线已运行时间</h2><div class="time-value" id="elapsedTimeDisplay">0.00 <span class="time-unit">小时</span></div></div>
            <div class="card" style="border-color:#8b5cf6;">
                <h2>🎯 该刻预期产量 (快照基准)</h2>
                <div class="time-value" id="expectedOutput" style="color: #f472b6;">0</div>
                <div style="color: #94a3b8; font-size: 14px; margin-top: 5px;">(打卡时系统锁定的目标)</div>
            </div>
        </div>
        
        <div class="patrol-entry" id="patrolEntryArea" style="display: none;">
            <h2 style="color: #cbd5e1; margin-top:0;">📝 巡线员产量打卡 (Hourly Patrol)</h2>
            <p style="color: #94a3b8; margin-bottom: 15px;">请输入此刻机器上的<b>当前总累计产量</b></p>
            <input type="number" id="patrolOutputInput" class="patrol-input" value="0" min="0">
            <button class="btn-submit-patrol" onclick="submitPatrolSnapshot()">💾 打卡：提交当前产量并计算达标率</button>
            <div id="lastUpdateHint" class="last-update-hint">✅ 打卡成功！看板数据已同步冻结至此分秒。</div>
        </div>
    </div>

    <script>
        function hashPIN(str) { let hash = 0; for (let i = 0; i < str.length; i++) { hash = (hash << 5) - hash + str.charCodeAt(i); hash |= 0; } return hash.toString(); }
        const WORKER_HASH = "1509508"; // 1258
        const PMC_HASH = "1573052";    // 3692
        let currentRole = ""; 

        function verifyPIN() {
            let input = document.getElementById('pinInput').value; let hashedInput = hashPIN(input);
            if (hashedInput === WORKER_HASH) { currentRole = "WORKER"; setupUIForRole(); document.getElementById('authOverlay').style.display = 'none'; } 
            else if (hashedInput === PMC_HASH) { currentRole = "PMC"; setupUIForRole(); document.getElementById('authOverlay').style.display = 'none'; fetchPMCPlanList(); } 
            else { document.getElementById('pinError').style.display = 'block'; document.getElementById('pinInput').value = ''; }
        }
        document.getElementById('pinInput').addEventListener("keypress", function(e) { if (e.key === "Enter") verifyPIN(); });

        function setupUIForRole() {
            document.getElementById('dateInput').value = getCambodiaDateString();
            if (currentRole === "PMC") {
                document.getElementById('mainTitle').innerHTML = "⚙️ 基础资料输入 - 指定人员"; document.getElementById('mainTitle').className = "pmc-header";
                document.getElementById('workerFetchGroup').style.display = 'none'; document.getElementById('pmcControls').style.display = 'flex';
                document.getElementById('workerControls').style.display = 'none'; document.getElementById('productionDashboardArea').style.display = 'none';
                document.getElementById('pmcDashboardArea').style.display = 'block';
                document.getElementById('dateInput').disabled = false; document.getElementById('factoryInput').disabled = false; document.getElementById('lineInput').disabled = false;
                document.getElementById('brandInput').disabled = false; document.getElementById('orderInput').disabled = false;
                document.getElementById('startTimeInput').disabled = false; document.getElementById('poh').disabled = false; document.getElementById('workers').disabled = false;
            } else if (currentRole === "WORKER") {
                document.getElementById('mainTitle').innerHTML = "⚡ 产线巡回打卡端 (Hourly Patrol)";
                document.getElementById('workerFetchGroup').style.display = 'block'; document.getElementById('pmcControls').style.display = 'none';
                document.getElementById('workerControls').style.display = 'flex'; document.getElementById('productionDashboardArea').style.display = 'block';
                document.getElementById('pmcDashboardArea').style.display = 'none';
                document.getElementById('brandInput').disabled = true; document.getElementById('orderInput').disabled = true;
                document.getElementById('startTimeInput').disabled = true; document.getElementById('poh').disabled = true; document.getElementById('workers').disabled = true;
            }
        }

        function getCambodiaDateString() { let formatter = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Phnom_Penh', year: 'numeric', month: '2-digit', day: '2-digit' }); return formatter.format(new Date()); }
        function getCambodiaTimestamp(dateStr, timeStr) { return new Date(`${dateStr}T${timeStr}:00+07:00`).getTime(); }

        function getLunchDeductionMs(startMs, endMs) {
            if (!startMs || !endMs || startMs >= endMs) return 0;
            let formatter = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Phnom_Penh', year: 'numeric', month: '2-digit', day: '2-digit' });
            let dateStr = formatter.format(new Date(startMs)); 
            let lunchStartMs = new Date(`${dateStr}T11:30:00+07:00`).getTime(); let lunchEndMs = new Date(`${dateStr}T12:30:00+07:00`).getTime();
            let overlapStart = Math.max(startMs, lunchStartMs); let overlapEnd = Math.min(endMs, lunchEndMs);
            return Math.max(0, overlapEnd - overlapStart);
        }

        const firebaseConfig = { apiKey: "AIzaSyDqZ1g_Rnb-qf0ij0Y53PyGJgzYoWDVeKk", authDomain: "factory-mes-2026.firebaseapp.com", databaseURL: "https://factory-mes-2026-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "factory-mes-2026" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); const db = firebase.database();

        let timerInterval = null; let isRunning = false; let isPaused = false; let isEnded = false;
        let chronologicalStartMs = null; let pauseDateMs = null; let accumulatedPauseMs = 0;      
        let targetPoh = 0; let targetWorkers = 0; let dbRefPath = null; let actualCount = 0;

        document.getElementById('dateInput').addEventListener('change', fetchPMCPlanList);

        function fetchPMCPlanList() {
            if (currentRole !== "PMC") return;
            let dateVal = document.getElementById('dateInput').value; let listBody = document.getElementById('pmcPlanListBody');
            db.ref('production_data/' + dateVal).on('value', snap => {
                listBody.innerHTML = ""; if (!snap.exists()) { listBody.innerHTML = "<tr><td colspan='5'>📭 无纪录</td></tr>"; return; }
                let lines = Object.values(snap.val()); lines.sort((a,b) => a.factory.localeCompare(b.factory) || a.line.localeCompare(b.line, undefined, {numeric: true}));
                lines.forEach(d => {
                    let tr = document.createElement('tr');
                    let statusIcon = d.status === 'STANDBY' ? '⚪' : (d.status === 'RUNNING' ? '🟢' : (d.status === 'PAUSED' ? '🟡' : (d.status === 'STOPPED' ? '🔴' : '⚫')));
                    tr.innerHTML = `<td><b>${d.factory} - ${d.line}</b></td><td style="color:#38bdf8;">${d.brand}</td><td>${d.poh}</td><td>${d.workers}</td><td>${statusIcon}</td>`;
                    listBody.appendChild(tr);
                });
            });
        }

        function publishPlan() {
            let dateVal = document.getElementById('dateInput').value; let factoryVal = document.getElementById('factoryInput').value; let lineVal = document.getElementById('lineInput').value;
            let brandVal = document.getElementById('brandInput').value; let orderVal = document.getElementById('orderInput').value; let timeVal = document.getElementById('startTimeInput').value;
            let pohVal = parseFloat(document.getElementById('poh').value); let workersVal = parseInt(document.getElementById('workers').value);
            if (!factoryVal || !lineVal || !brandVal || !orderVal || !timeVal || isNaN(pohVal) || isNaN(workersVal)) { alert("❌ 资料不可留空！"); return; }

            dbRefPath = `production_data/${dateVal}/${factoryVal}_${lineVal}`;
            db.ref(dbRefPath).once('value').then(snap => {
                if (snap.exists() && snap.val().status !== "STANDBY" && !confirm("⚠️ 已有纪录，确定覆盖重置为待命？")) return;
                db.ref(dbRefPath).set({
                    factory: factoryVal, line: lineVal, brand: brandVal, order: orderVal, startTime: timeVal, poh: pohVal, workers: workersVal,
                    actualOutput: 0, expectedOutput: 0, achievementRate: 0, elapsedMins: 0, accumulatedPauseMs: 0, status: "STANDBY", 
                    lastReportExpected: 0, lastReportRate: 0, lastReportMs: 0, // 新增：快照变量
                    lastUpdateMs: Date.now(), lastUpdate: new Date().toLocaleTimeString('zh-CN', { timeZone: 'Asia/Phnom_Penh' })
                }).then(() => { alert("✅ 发布成功！"); document.getElementById('lineInput').value = ""; });
            });
        }

        function fetchPlan() {
            let dateVal = document.getElementById('dateInput').value; let factoryVal = document.getElementById('factoryInput').value; let lineVal = document.getElementById('lineInput').value;
            if (!factoryVal || !lineVal) { alert("请选择厂线！"); return; }
            dbRefPath = `production_data/${dateVal}/${factoryVal}_${lineVal}`;
            db.ref(dbRefPath).once('value').then((snapshot) => {
                if (!snapshot.exists()) { alert("⚠️ 找不到排产！"); return; }
                let data = snapshot.val();
                document.getElementById('brandInput').value = data.brand || ''; document.getElementById('orderInput').value = data.order || '';
                document.getElementById('startTimeInput').value = data.startTime || ''; document.getElementById('poh').value = data.poh || 0; document.getElementById('workers').value = data.workers || 0;
                
                targetPoh = parseFloat(data.poh); targetWorkers = parseInt(data.workers);
                actualCount = parseInt(data.actualOutput) || 0; document.getElementById('patrolOutputInput').value = actualCount;
                accumulatedPauseMs = data.accumulatedPauseMs || 0;

                if (data.status === "STANDBY") {
                    document.getElementById('startBtn').disabled = false; document.getElementById('startBtn').style.opacity = "1";
                    document.getElementById('statusText').innerHTML = `状态：<span style="color:#facc15;">⚪ 待命</span>`;
                } else {
                    restoreSession(data, dateVal);
                }
            });
        }

        function restoreSession(data, dateVal) {
            if (data.status === "STOPPED") {
                alert("⚠️ 产线已结束。"); isEnded = true; isRunning = false; isPaused = false;
                document.getElementById('patrolEntryArea').style.display = 'none';
                document.getElementById('statusText').innerHTML = `状态：<span style="color:#ef4444;">🔴 已结束 (锁定)</span>`;
                let elapsedHours = data.elapsedMins / 60; document.getElementById('elapsedTimeDisplay').innerHTML = `${elapsedHours.toFixed(2)} <span class="time-unit">小时</span>`;
                document.getElementById('expectedOutput').innerText = data.lastReportExpected || data.expectedOutput;
                return;
            }
            if (confirm(`📡 找到运行中纪录 (目前产量: ${data.actualOutput})！是否恢复打卡界面？`)) {
                beginRunLogic(dateVal, data.startTime, data.factory, data.line, false);
                if (data.status === "PAUSED") { isRunning = true; togglePause(); }
            }
        }

        function startProduction() {
            if (isRunning || isPaused || isEnded) return; 
            let dateVal = document.getElementById('dateInput').value; let timeVal = document.getElementById('startTimeInput').value;
            let factoryVal = document.getElementById('factoryInput').value; let lineVal = document.getElementById('lineInput').value;
            beginRunLogic(dateVal, timeVal, factoryVal, lineVal, false);
            submitPatrolSnapshot(); // 开工即打卡 0 产量
        }

        function beginRunLogic(dateVal, timeVal, factoryVal, lineVal, isForceStop) {
            chronologicalStartMs = getCambodiaTimestamp(dateVal, timeVal);
            if (chronologicalStartMs > Date.now()) { alert("开工时间不能在未来！"); return; }
            document.getElementById('dateInput').disabled = true; document.getElementById('factoryInput').disabled = true; document.getElementById('lineInput').disabled = true;
            document.querySelector('.btn-fetch').disabled = true; document.querySelector('.btn-fetch').style.opacity = "0.5";
            isRunning = !isForceStop; isPaused = false; isEnded = isForceStop; pauseDateMs = null;
            document.getElementById('startBtn').disabled = true; document.getElementById('startBtn').style.opacity = "0.5";
            
            if (!isForceStop) {
                document.getElementById('pauseBtn').disabled = false; document.getElementById('pauseBtn').style.opacity = "1";
                document.getElementById('endBtn').disabled = false; document.getElementById('endBtn').style.opacity = "1";
                document.getElementById('patrolEntryArea').style.display = 'block';
                document.getElementById('statusText').innerHTML = `状态：<span style="color:#10b981;">🟢 运行中</span>`;
                db.ref(dbRefPath).onDisconnect().update({ status: "OFFLINE", lastUpdate: "离线" });
                timerInterval = setInterval(updateLocalTimer, 1000);
            }
            let megaBanner = document.getElementById('megaOrderDisplay'); megaBanner.style.display = 'block';
            megaBanner.innerHTML = `📅 ${dateVal} | 🏭 ${factoryVal} - ${lineVal} | ⭐ 品牌: ${document.getElementById('brandInput').value}`;
            updateLocalTimer();
        }

        // 本地计时器，仅显示时间，不再每秒 push 云端
        function updateLocalTimer() {
            if (!chronologicalStartMs) return;
            let calculateTimeMs = (isPaused || isEnded) ? (pauseDateMs || Date.now()) : Date.now();
            let rawMs = calculateTimeMs - chronologicalStartMs;
            let lunchMs = getLunchDeductionMs(chronologicalStartMs, calculateTimeMs);
            let activeMs = rawMs - lunchMs - accumulatedPauseMs;
            let elapsedMins = activeMs / 60000; if(elapsedMins < 0) elapsedMins = 0; let elapsedHours = elapsedMins / 60;
            document.getElementById('elapsedTimeDisplay').innerHTML = `${elapsedHours.toFixed(2)} <span class="time-unit">小时</span>`;
        }

        // 🚀 核心：提交快照打卡
        function submitPatrolSnapshot() {
            if (!isRunning) { alert(isPaused ? "产线暂停中，请先继续！" : "尚未开工！"); return; }
            
            let val = parseInt(document.getElementById('patrolOutputInput').value);
            if (isNaN(val) || val < 0) { alert("产量必须是有效数字！"); return; }
            actualCount = val;

            let calculateTimeMs = Date.now();
            let rawMs = calculateTimeMs - chronologicalStartMs;
            let lunchMs = getLunchDeductionMs(chronologicalStartMs, calculateTimeMs);
            let activeMs = rawMs - lunchMs - accumulatedPauseMs;
            let elapsedMins = activeMs / 60000; if(elapsedMins < 0) elapsedMins = 0;
            
            let expectedAtThisMoment = Math.floor((targetPoh * targetWorkers / 60) * elapsedMins);
            let rateAtThisMoment = 0; 
            if (expectedAtThisMoment > 0) rateAtThisMoment = (actualCount / expectedAtThisMoment) * 100;

            document.getElementById('expectedOutput').innerText = expectedAtThisMoment;

            // 冻结这一刻的预期和达标率并上传
            db.ref(dbRefPath).update({
                actualOutput: actualCount, 
                expectedOutput: expectedAtThisMoment, // 传统兼容
                elapsedMins: elapsedMins, 
                status: "RUNNING",
                lastReportExpected: expectedAtThisMoment, // 快照：该刻预期
                lastReportRate: rateAtThisMoment,         // 快照：该刻达标率
                lastReportMs: Date.now(),                 // 快照：打卡时间戳
                lastUpdateMs: Date.now(), 
                lastUpdate: new Date().toLocaleTimeString('zh-CN', { timeZone: 'Asia/Phnom_Penh' })
            }).then(() => {
                let hint = document.getElementById('lastUpdateHint');
                hint.style.display = 'block'; setTimeout(() => hint.style.display = 'none', 3000);
            });
        }

        function togglePause() {
            if (isEnded) return; let pauseBtn = document.getElementById('pauseBtn');
            if (isRunning) {
                clearInterval(timerInterval); isRunning = false; isPaused = true; pauseDateMs = Date.now();
                pauseBtn.innerHTML = "▶️ 继续"; pauseBtn.style.background = "linear-gradient(135deg, #3b82f6, #2563eb)"; 
                document.getElementById('statusText').innerHTML = `状态：<span style="color:#facc15;">🟡 已暂停</span>`;
                db.ref(dbRefPath).update({ status: "PAUSED", lastUpdateMs: Date.now() });
            } else if (isPaused) {
                let pauseDuration = Date.now() - pauseDateMs; let lunchPauseOverlap = getLunchDeductionMs(pauseDateMs, Date.now());
                accumulatedPauseMs += (pauseDuration - lunchPauseOverlap); 
                isRunning = true; isPaused = false; pauseDateMs = null;
                pauseBtn.innerHTML = "⏸️ 暂停"; pauseBtn.style.background = ""; 
                document.getElementById('statusText').innerHTML = `状态：<span style="color:#10b981;">🟢 运行中</span>`;
                db.ref(dbRefPath).update({ status: "RUNNING", accumulatedPauseMs: accumulatedPauseMs, lastUpdateMs: Date.now() }); 
                timerInterval = setInterval(updateLocalTimer, 1000); updateLocalTimer();
            }
        }

        function endProduction() {
            if (isEnded) return;
            if (confirm("确定要【结束】此线生产吗？\n结束后系统将锁定最后一次打卡数据。")) {
                clearInterval(timerInterval); isRunning = false; isPaused = false; isEnded = true;
                db.ref(dbRefPath).onDisconnect().cancel();
                document.getElementById('pauseBtn').disabled = true; document.getElementById('pauseBtn').style.opacity = "0.5";
                document.getElementById('endBtn').disabled = true; document.getElementById('endBtn').style.opacity = "0.5";
                document.getElementById('patrolEntryArea').style.display = 'none';
                document.getElementById('statusText').innerHTML = `状态：<span style="color:#ef4444;">🔴 已结束</span>`;
                db.ref(dbRefPath).update({ status: "STOPPED", lastUpdateMs: Date.now() });
            }
        }

        function resetProduction() { if(confirm("确定清除画面？")) { if(dbRefPath) db.ref(dbRefPath).onDisconnect().cancel(); location.reload(); } }
    </script>
</body>
</html>
