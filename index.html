<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 产线输入端 - 智能生产线</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        * { box-sizing: border-box; } 
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0b0f19; color: #e2e8f0; margin: 0; padding: 10px 15px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        h1 { text-align: center; color: #00e5ff; text-shadow: 0 0 15px rgba(0, 229, 255, 0.6); letter-spacing: 3px; margin: 0 0 10px 0; font-size: 26px; flex-shrink: 0; }
        .mega-order-display { text-align: center; font-size: 24px; font-weight: bold; color: #facc15; text-shadow: 0 0 15px rgba(250, 204, 21, 0.6); margin-bottom: 10px; letter-spacing: 2px; display: none; background: rgba(250, 204, 21, 0.1); padding: 8px; border-radius: 8px; border: 2px solid rgba(250, 204, 21, 0.3); flex-shrink: 0; }
        .panel { background: rgba(30, 41, 59, 0.8); border: 1px solid #334155; padding: 12px 15px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.5); margin-bottom: 10px; flex-shrink: 0; }
        .input-row { display: flex; flex-wrap: wrap; gap: 15px; align-items: center; margin-bottom: 10px; }
        .input-row:last-child { margin-bottom: 0; }
        .form-group { display: flex; align-items: center; gap: 8px; }
        .form-group label { font-weight: bold; color: #94a3b8; font-size: 15px; white-space: nowrap; } 
        input[type="number"], input[type="time"], input[type="text"], input[type="date"], input[type="password"], select { background-color: #0f172a; color: #00e5ff; border: 2px solid #38bdf8; padding: 6px 10px; border-radius: 6px; font-size: 16px; font-weight: bold; outline: none; box-shadow: inset 0 0 8px rgba(56, 189, 248, 0.3); text-transform: uppercase; }
        input:focus, select:focus { border-color: #00e5ff; box-shadow: 0 0 12px rgba(0, 229, 255, 0.8); }
        .short-input { width: 110px; } .long-input { width: 150px; }
        select option { background-color: #0f172a; color: #e2e8f0; } select optgroup { color: #38bdf8; }
        .action-buttons { display: flex; align-items: center; gap: 10px; flex-grow: 1; justify-content: flex-end; flex-wrap: wrap; }
        button { padding: 6px 15px; font-size: 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: #fff; text-transform: uppercase; transition: all 0.3s ease; letter-spacing: 1px; }
        
        .btn-start { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
        .btn-start:hover { transform: translateY(-2px); box-shadow: 0 0 15px rgba(16, 185, 129, 0.8); }
        .btn-stop { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .btn-end { background: linear-gradient(135deg, #ef4444, #dc2626); } /* 红色结束按钮 */
        .btn-reset { background: linear-gradient(135deg, #64748b, #475569); }
        
        .status-text { font-size: 15px; color: #94a3b8; font-weight: bold; margin-left: 10px; }
        .top-dashboard { margin-bottom: 10px; flex-shrink: 0; }
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; flex-grow: 1; min-height: 0; }
        .card { background: rgba(30, 41, 59, 0.6); border: 1px solid #334155; padding: 10px 20px; border-radius: 12px; position: relative; overflow: hidden; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 6px; }
        .dashboard .card:nth-child(1)::before { background: #38bdf8; box-shadow: 0 0 15px #38bdf8; }
        .dashboard .card:nth-child(2)::before { background: #f472b6; box-shadow: 0 0 15px #f472b6; }
        .dashboard .card:nth-child(3)::before { background: #8b5cf6; box-shadow: 0 0 15px #8b5cf6; }
        .card.top-card::before { background: #10b981 !important; box-shadow: 0 0 15px #10b981 !important; }
        .card h2 { margin-top: 0; font-size: 22px; color: #cbd5e1; letter-spacing: 1px; margin-bottom: 5px;}
        .value { font-size: 75px; font-weight: bold; margin: 5px 0; font-family: 'Courier New', Courier, monospace; }
        .rate-value { font-size: 95px; } 
        .time-value { color: #38bdf8; line-height: 1.1; font-size: 60px; }
        .time-unit { font-size: 24px; } .time-sub { font-size: 20px; color: #94a3b8; }
        .btn-add { background: linear-gradient(135deg, #8b5cf6, #6d28d9); font-size: 36px; width: 90px; height: 90px; border-radius: 50%; margin: 5px; box-shadow: 0 0 15px rgba(139, 92, 246, 0.6); border: 3px solid #a78bfa; }
        .btn-add:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(139, 92, 246, 0.9); }
        .manual-entry { margin-top: 10px; padding-top: 10px; border-top: 1px solid #334155; display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 5px; width: 100%; }
        .manual-input { width: 100px; text-align: center; font-size: 20px; padding: 8px; background-color: #0f172a; color: #00e5ff; border: 2px solid #38bdf8; border-radius: 6px; font-weight: bold; outline: none; }
        .btn-bulk { background: #3b82f6; font-size: 18px; padding: 8px 20px; }
        .good { color: #10b981; text-shadow: 0 0 20px rgba(16, 185, 129, 0.8); }
        .warning { color: #facc15; text-shadow: 0 0 20px rgba(250, 204, 21, 0.8); }
        .danger { color: #ef4444; text-shadow: 0 0 20px rgba(239, 68, 68, 0.8); }
        .editable-number { cursor: pointer; border-bottom: 2px dashed #8b5cf6; display: inline-block; padding: 0 10px; transition: 0.3s; }
        .editable-number:hover { transform: scale(1.05); text-shadow: 0 0 20px rgba(139, 92, 246, 0.8); }
        
        @media (max-width: 900px) {
            body { height: auto; min-height: 100vh; overflow: auto; padding: 10px; }
            .mega-order-display { font-size: 16px; line-height: 1.4; padding: 12px;}
            .input-row { flex-direction: column; align-items: stretch; gap: 12px; }
            .form-group { flex-direction: row; align-items: center; gap: 10px; width: 100%; justify-content: space-between; }
            .form-group label { margin-bottom: 0; white-space: normal; max-width: 45%; flex-shrink: 0; text-align: left; }
            .form-group input, .form-group select { flex: 1; width: 10% !important; }
            .action-buttons { flex-direction: column; align-items: stretch; margin-top: 10px; }
            .action-buttons button { width: 100%; padding: 12px; margin-bottom: 5px; font-size: 18px;}
            .status-text { text-align: center; margin-left: 0; margin-top: 5px; display: block; }
            .dashboard { grid-template-columns: 1fr; }
            .card { padding: 25px 15px; }
            .card h2 { font-size: 22px; } .value { font-size: 75px; } .rate-value { font-size: 95px; } .time-value { font-size: 65px; }
            .btn-add { width: 100px; height: 100px; font-size: 40px; }
        }

        #authOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0b0f19; z-index: 9999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .auth-box {
            background: rgba(30, 41, 59, 0.9); border: 2px solid #38bdf8; padding: 40px;
            border-radius: 15px; box-shadow: 0 0 30px rgba(56, 189, 248, 0.3); text-align: center;
        }
        .auth-box h2 { color: #00e5ff; margin-top: 0; font-size: 28px; letter-spacing: 2px; }
        .auth-box input { font-size: 30px; letter-spacing: 10px; width: 150px; text-align: center; margin: 20px 0; }
        .auth-box button { font-size: 20px; padding: 10px 40px; width: 100%; }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="auth-box">
            <h2>🔒 产线系统授权</h2>
            <p style="color: #94a3b8;">请输入车间专用操作密码</p>
            <input type="password" id="pinInput" placeholder="***" maxlength="3">
            <br>
            <button class="btn-bulk" onclick="verifyPIN()">进入系统</button>
            <p id="pinError" style="color: #ef4444; display: none; margin-top: 15px; font-weight: bold;">❌ 密码错误，请重试</p>
        </div>
    </div>

    <h1>⚡ 产线输入端 - 智能生产线 ⚡</h1>
    <div id="megaOrderDisplay" class="mega-order-display"></div>

    <div class="panel">
        <div class="input-row">
            <div class="form-group"><label>📅 日期:</label><input type="date" id="dateInput" class="long-input"></div>
            <div class="form-group"><label>🏭 工厂:</label>
                <select id="factoryInput" class="short-input">
                    <option value="" disabled selected>请选择...</option><option value="LY">LY</option><option value="LFY">LFY</option>
                </select>
            </div>
            <div class="form-group"><label>🏭 线别:</label>
                <select id="lineInput" class="short-input" style="width: 140px;">
                    <option value="" disabled selected>请选择...</option>
                    <optgroup label="成型">
                        <option value="成型A">成型A</option><option value="成型B">成型B</option><option value="成型C">成型C</option>
                        <option value="成型D">成型D</option><option value="成型E">成型E</option><option value="成型F">成型F</option>
                    </optgroup>
                    <optgroup label="针车">
                        <option value="针车1">针车1</option><option value="针车2">针车2</option><option value="针车3">针车3</option>
                        <option value="针车4">针车4</option><option value="针车5">针车5</option><option value="针车6">针车6</option>
                    </optgroup>
                </select>
            </div>
            <div class="form-group"><label>🏷️ 品牌:</label><input type="text" id="brandInput" class="long-input"></div>
            <div class="form-group"><label>📄 单号:</label><input type="text" id="orderInput" class="long-input"></div>
        </div>
        
        <div class="input-row">
            <div class="form-group"><label>⏱️ 开工时间:</label><input type="time" id="startTimeInput" class="short-input"></div>
            <div class="form-group"><label>📈 本日100%POH:</label><input type="number" id="poh" class="short-input" step="0.01" min="0"></div>
            <div class="form-group"><label>👥 生产/配备员工+班组课:</label><input type="number" id="workers" class="short-input" min="1"></div>
            <div class="action-buttons">
                <button class="btn-start" id="startBtn" onclick="startProduction()">▶️ 锁定并开始</button>
                <button class="btn-stop" id="pauseBtn" onclick="togglePause()" disabled style="opacity: 0.5;">⏸️ 暂停</button>
                <button class="btn-end" id="endBtn" onclick="endProduction()" disabled style="opacity: 0.5;">⏹️ 结束</button>
                <button class="btn-reset" onclick="resetProduction()">🗑️ 重设</button>
                <span class="status-text" id="statusText">系统状态：STANDBY (未开始)</span>
            </div>
        </div>
    </div>

    <div class="top-dashboard"><div class="card top-card"><h2>📈 实时达标率</h2><div class="value rate-value" id="achievementRate">0%</div></div></div>

    <div class="dashboard">
        <div class="card"><h2>⏱️ 累计运行时间</h2><div class="value time-value" id="elapsedTimeDisplay">0.00 <span class="time-unit">小时</span><br><span class="time-sub">(0.0 分钟)</span></div></div>
        <div class="card"><h2>🎯 严格预期产量</h2><div class="value" id="expectedOutput" style="color: #f472b6;">0</div></div>
        <div class="card">
            <h2>📦 实际达成产量 (点击数字修改)</h2>
            <div class="value editable-number" id="actualOutput" style="color: #8b5cf6;" onclick="editActualOutput()" title="点击直接修改数字">0</div>
            <div><button class="btn-add" onclick="addOutput(1)">+1</button></div>
            <div class="manual-entry"><input type="number" id="manualValue" class="manual-input" value="10"><button class="btn-bulk" onclick="addBulkOutput()">➕ 增加</button></div>
        </div>
    </div>

    <script>
        // 🔐 设定进入密码 (已更改为 888)
        const ACCESS_PIN = "888";
        function verifyPIN() {
            let input = document.getElementById('pinInput').value;
            if (input === ACCESS_PIN) document.getElementById('authOverlay').style.display = 'none';
            else { document.getElementById('pinError').style.display = 'block'; document.getElementById('pinInput').value = ''; }
        }
        document.getElementById('pinInput').addEventListener("keypress", function(e) { if (e.key === "Enter") verifyPIN(); });

        const firebaseConfig = {
            apiKey: "AIzaSyDqZ1g_Rnb-qf0ij0Y53PyGJgzYoWDVeKk",
            authDomain: "factory-mes-2026.firebaseapp.com",
            databaseURL: "https://factory-mes-2026-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "factory-mes-2026",
            storageBucket: "factory-mes-2026.firebasestorage.app",
            messagingSenderId: "710873291817",
            appId: "1:710873291817:web:92ea2aadc4dd895fb19038"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let actualCount = 0; let timerInterval = null; 
        let isRunning = false; let isPaused = false; let isEnded = false;
        let customStartDate = null; let pauseDate = null; 
        let targetPoh = 0; let targetWorkers = 0;

        window.onload = function() { setTodayDate(); };
        function setTodayDate() {
            let today = new Date();
            document.getElementById('dateInput').value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        }

        // 推送数据 (加入三态 Status)
        function pushDataToCloud(elapsedMins, expectedOutput, rate) {
            if(!isRunning && !isPaused && !isEnded) return;
            let dateVal = document.getElementById('dateInput').value; 
            let factoryVal = document.getElementById('factoryInput').value;
            let lineVal = document.getElementById('lineInput').value;
            
            let statusStr = "RUNNING";
            if (isEnded) statusStr = "STOPPED";
            else if (isPaused) statusStr = "PAUSED";
            
            db.ref(`production_data/${dateVal}/${factoryVal}_${lineVal}`).set({
                factory: factoryVal, line: lineVal,
                brand: document.getElementById('brandInput').value || '未输入',
                order: document.getElementById('orderInput').value || '未输入',
                poh: targetPoh, workers: targetWorkers,
                startTime: document.getElementById('startTimeInput').value, 
                actualOutput: actualCount, expectedOutput: expectedOutput,
                achievementRate: rate, elapsedMins: elapsedMins,
                status: statusStr,
                lastUpdate: new Date().toLocaleTimeString('zh-CN')
            });
        }

        function startProduction() {
            if (isRunning || isPaused || isEnded) return; 
            
            let dateVal = document.getElementById('dateInput').value;
            let factoryVal = document.getElementById('factoryInput').value;
            let lineVal = document.getElementById('lineInput').value;
            let timeVal = document.getElementById('startTimeInput').value;
            targetPoh = parseFloat(document.getElementById('poh').value);
            targetWorkers = parseInt(document.getElementById('workers').value);
            
            if (!dateVal || !factoryVal || !lineVal) { alert("请至少填妥：日期、工厂、线别！"); return; }

            db.ref(`production_data/${dateVal}/${factoryVal}_${lineVal}`).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    let savedData = snapshot.val();
                    if (confirm(`📡 寻找到今日进度！\n品牌: ${savedData.brand}\n目前产量: ${savedData.actualOutput}\n\n是否恢复此进度？\n(按确定恢复，按取消将重新开始)`)) {
                        restoreSession(savedData); return;
                    }
                }
                if (!timeVal || isNaN(targetPoh) || isNaN(targetWorkers)) { alert("请填妥所有资料！"); return; }
                beginRun(dateVal, timeVal, factoryVal, lineVal);
            });
        }

        function restoreSession(data) {
            document.getElementById('brandInput').value = data.brand;
            document.getElementById('orderInput').value = data.order;
            document.getElementById('startTimeInput').value = data.startTime;
            document.getElementById('poh').value = data.poh;
            document.getElementById('workers').value = data.workers;
            
            targetPoh = data.poh; targetWorkers = data.workers; actualCount = data.actualOutput;
            document.getElementById('actualOutput').innerText = actualCount;
            
            if (data.status === "STOPPED") {
                alert("⚠️ 注意：该产线已【结束】生产，数据已冻结不可修改。");
                isEnded = true;
                disableAllInputs();
                document.getElementById('statusText').innerHTML = `系统状态：<span style="color:#ef4444;">🔴 已结束 (读取历史记录)</span>`;
                updateDashboard();
                return;
            }
            beginRun(document.getElementById('dateInput').value, data.startTime, data.factory, data.line);
            
            if (data.status === "PAUSED") {
                alert("⚠️ 该产线之前处于『暂停』状态。系统自动进入暂停模式。");
                togglePause(); // 触发暂停逻辑
            }
        }

        function beginRun(dateVal, timeVal, factoryVal, lineVal) {
            let [year, month, day] = dateVal.split('-'); let [hours, minutes] = timeVal.split(':');
            customStartDate = new Date(year, month - 1, day, hours, minutes, 0);
            if (customStartDate > new Date()) { alert("开工时间不能晚于现在！"); return; }

            disableAllInputs();
            isRunning = true; isPaused = false; isEnded = false; pauseDate = null;
            
            document.getElementById('startBtn').disabled = true; document.getElementById('startBtn').style.opacity = "0.5";
            document.getElementById('pauseBtn').disabled = false; document.getElementById('pauseBtn').style.opacity = "1";
            document.getElementById('endBtn').disabled = false; document.getElementById('endBtn').style.opacity = "1";
            
            let megaBanner = document.getElementById('megaOrderDisplay');
            megaBanner.style.display = 'block';
            megaBanner.innerHTML = `📅 ${year}年${month}月${day}日 &nbsp;|&nbsp; 🏭 ${factoryVal} - ${lineVal} &nbsp;|&nbsp; ⭐ 品牌: ${document.getElementById('brandInput').value || '未输入'} ⭐`;
            document.getElementById('statusText').innerHTML = `系统状态：<span style="color:#10b981;">🟢 运行中</span>`;

            updateDashboard(); timerInterval = setInterval(updateDashboard, 1000);
        }

        function disableAllInputs() {
            document.getElementById('dateInput').disabled = true; document.getElementById('factoryInput').disabled = true;
            document.getElementById('lineInput').disabled = true; document.getElementById('brandInput').disabled = true;
            document.getElementById('orderInput').disabled = true; document.getElementById('startTimeInput').disabled = true;
            document.getElementById('poh').disabled = true; document.getElementById('workers').disabled = true;
        }

        // 🟡 暂停/继续
        function togglePause() {
            if (isEnded) return;
            let pauseBtn = document.getElementById('pauseBtn');
            if (isRunning) {
                clearInterval(timerInterval);
                isRunning = false; isPaused = true; pauseDate = new Date();
                pauseBtn.innerHTML = "▶️ 继续"; pauseBtn.style.background = "linear-gradient(135deg, #3b82f6, #2563eb)"; 
                document.getElementById('statusText').innerHTML = `系统状态：<span style="color:#facc15;">🟡 已暂停</span>`;
                updateDashboard();
            } else if (isPaused) {
                let pauseDuration = new Date() - pauseDate; 
                customStartDate = new Date(customStartDate.getTime() + pauseDuration); // 抵消时间
                isRunning = true; isPaused = false; pauseDate = null;
                pauseBtn.innerHTML = "⏸️ 暂停"; pauseBtn.style.background = ""; 
                document.getElementById('statusText').innerHTML = `系统状态：<span style="color:#10b981;">🟢 运行中</span>`;
                timerInterval = setInterval(updateDashboard, 1000);
                updateDashboard();
            }
        }

        // 🔴 结束生产
        function endProduction() {
            if (isEnded) return;
            if (confirm("确定要【结束】今日此线生产吗？\n结束后状态将变红，且不可再修改产量。")) {
                clearInterval(timerInterval);
                isRunning = false; isPaused = false; isEnded = true;
                
                document.getElementById('pauseBtn').disabled = true; document.getElementById('pauseBtn').style.opacity = "0.5";
                document.getElementById('endBtn').disabled = true; document.getElementById('endBtn').style.opacity = "0.5";
                
                document.getElementById('statusText').innerHTML = `系统状态：<span style="color:#ef4444;">🔴 已结束</span>`;
                updateDashboard();
            }
        }

        function addOutput(amount) {
            if (isEnded) { alert("此线已结束生产，不可再更改！"); return; }
            if (!isRunning) { alert(isPaused ? "产线暂停中，请先按「继续」" : "请先按「锁定并开始」"); return; }
            actualCount += amount; if (actualCount < 0) actualCount = 0; 
            document.getElementById('actualOutput').innerText = actualCount; updateDashboard();
        }

        function addBulkOutput() { let val = parseInt(document.getElementById('manualValue').value); if (!isNaN(val)) addOutput(val); }

        function editActualOutput() {
            if (isEnded) { alert("此线已结束生产，不可再更改！"); return; }
            if (!isRunning && !isPaused) { alert("请先按「锁定并开始」！"); return; }
            let newVal = prompt("请输入当前的实际达成产量 (必须为纯数字):", actualCount);
            if (newVal !== null && !isNaN(parseInt(newVal)) && parseInt(newVal) >= 0) {
                actualCount = parseInt(newVal); document.getElementById('actualOutput').innerText = actualCount; updateDashboard();
            }
        }

        function updateDashboard() {
            if (!customStartDate) return;
            let calculateTime = (isPaused || isEnded) ? (pauseDate || new Date()) : new Date();
            if (isEnded && !pauseDate) calculateTime = new Date(); // 若直接从运行按结束

            let elapsedMins = (calculateTime - customStartDate) / 60000;
            if(elapsedMins < 0) elapsedMins = 0;
            let elapsedHours = elapsedMins / 60;
            
            document.getElementById('elapsedTimeDisplay').innerHTML = `${elapsedHours.toFixed(2)} <span class="time-unit">小时</span><br><span class="time-sub">(${elapsedMins.toFixed(1)} 分钟)</span>`;
            let expectedOutput = Math.floor((targetPoh * targetWorkers / 60) * elapsedMins);
            document.getElementById('expectedOutput').innerText = expectedOutput;

            let rate = 0; if (expectedOutput > 0) rate = (actualCount / expectedOutput) * 100;
            
            let rateElement = document.getElementById('achievementRate');
            rateElement.innerText = rate.toFixed(1) + "%";
            rateElement.className = "value rate-value"; 
            if (elapsedMins > 1) { 
                if (rate >= 100) rateElement.classList.add("good");
                else if (rate >= 90) rateElement.classList.add("warning");
                else rateElement.classList.add("danger");
            }
            pushDataToCloud(elapsedMins, expectedOutput, rate);
        }

        function resetProduction() { if(confirm("确定重置本页？\n(这只会清空画面，云端进度依然保留。若要换线，请重置后重新选择)")) location.reload(); }
    </script>
