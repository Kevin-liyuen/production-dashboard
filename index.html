<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 智能生产线系统</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        * { box-sizing: border-box; } 
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0b0f19; color: #e2e8f0; margin: 0; padding: 10px 15px; min-height: 100vh; display: flex; flex-direction: column; overflow-y: auto; }
        h1 { text-align: center; color: #00e5ff; text-shadow: 0 0 15px rgba(0, 229, 255, 0.6); letter-spacing: 3px; margin: 0 0 10px 0; font-size: 26px; flex-shrink: 0; }
        
        /* 角色头部颜色变化 */
        .pmc-header { color: #f472b6 !important; text-shadow: 0 0 15px rgba(244, 114, 182, 0.6) !important; }

        .mega-order-display { text-align: center; font-size: 24px; font-weight: bold; color: #facc15; text-shadow: 0 0 15px rgba(250, 204, 21, 0.6); margin-bottom: 10px; letter-spacing: 2px; display: none; background: rgba(250, 204, 21, 0.1); padding: 8px; border-radius: 8px; border: 2px solid rgba(250, 204, 21, 0.3); flex-shrink: 0; }
        .panel { background: rgba(30, 41, 59, 0.8); border: 1px solid #334155; padding: 12px 15px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.5); margin-bottom: 10px; flex-shrink: 0; }
        .input-row { display: flex; flex-wrap: wrap; gap: 15px; align-items: center; margin-bottom: 10px; }
        .input-row:last-child { margin-bottom: 0; }
        .form-group { display: flex; align-items: center; gap: 8px; }
        .form-group label { font-weight: bold; color: #94a3b8; font-size: 15px; white-space: nowrap; } 
        
        input[type="number"], input[type="time"], input[type="text"], input[type="date"], input[type="password"], select { background-color: #0f172a; color: #00e5ff; border: 2px solid #38bdf8; padding: 6px 10px; border-radius: 6px; font-size: 16px; font-weight: bold; outline: none; text-transform: uppercase; }
        input:focus, select:focus { border-color: #00e5ff; box-shadow: 0 0 12px rgba(0, 229, 255, 0.8); }
        
        input:-webkit-autofill { -webkit-box-shadow: 0 0 0 30px #0f172a inset !important; -webkit-text-fill-color: #00e5ff !important; transition: background-color 5000s ease-in-out 0s; }
        input:disabled, select:disabled { background-color: #1e293b !important; color: #64748b !important; border-color: #475569 !important; cursor: not-allowed; -webkit-text-fill-color: #64748b !important;}
        
        .short-input { width: 110px; } .long-input { width: 150px; }
        select option { background-color: #0f172a; color: #e2e8f0; } select optgroup { color: #38bdf8; }
        
        .action-buttons { display: flex; align-items: center; gap: 10px; flex-grow: 1; justify-content: flex-end; flex-wrap: wrap; }
        button { padding: 6px 15px; font-size: 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: #fff; text-transform: uppercase; transition: all 0.3s ease; letter-spacing: 1px; }
        
        .btn-fetch { background: linear-gradient(135deg, #8b5cf6, #6d28d9); box-shadow: 0 0 10px rgba(139, 92, 246, 0.5); }
        .btn-publish { background: linear-gradient(135deg, #f472b6, #be185d); box-shadow: 0 0 15px rgba(244, 114, 182, 0.6); font-size: 18px; padding: 10px 20px;}
        .btn-start { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
        .btn-stop { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .btn-end { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .btn-reset { background: linear-gradient(135deg, #64748b, #475569); }
        
        .status-text { font-size: 15px; color: #94a3b8; font-weight: bold; margin-left: 10px; }
        
        .top-dashboard { margin-bottom: 10px; flex-shrink: 0; }
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; flex-grow: 1; min-height: 350px; }
        .card { background: rgba(30, 41, 59, 0.6); border: 1px solid #334155; padding: 15px; border-radius: 12px; position: relative; overflow: hidden; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 250px;}
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 6px; }
        .dashboard .card:nth-child(1)::before { background: #38bdf8; }
        .dashboard .card:nth-child(2)::before { background: #f472b6; }
        .dashboard .card:nth-child(3)::before { background: #8b5cf6; }
        .card.top-card::before { background: #10b981 !important; }
        .card h2 { margin-top: 0; font-size: 22px; color: #cbd5e1; margin-bottom: 5px;}
        .value { font-size: 75px; font-weight: bold; margin: 5px 0; font-family: 'Courier New', Courier, monospace; }
        .rate-value { font-size: 95px; } 
        .time-value { color: #38bdf8; line-height: 1.1; font-size: 60px; }
        .time-unit { font-size: 24px; } .time-sub { font-size: 20px; color: #94a3b8; }
        .btn-add { background: linear-gradient(135deg, #8b5cf6, #6d28d9); font-size: 36px; width: 90px; height: 90px; border-radius: 50%; margin: 5px; border: 3px solid #a78bfa; flex-shrink:0;}
        .manual-entry { margin-top: 10px; padding-top: 10px; border-top: 1px solid #334155; display: flex; justify-content: center; align-items: center; gap: 5px; width: 100%; }
        .manual-input { width: 100px; text-align: center; font-size: 20px; padding: 8px; background-color: #0f172a; color: #00e5ff; border: 2px solid #38bdf8; border-radius: 6px; font-weight: bold; }
        .btn-bulk { background: #3b82f6; font-size: 18px; padding: 8px 20px; }
        .good { color: #10b981; } .warning { color: #facc15; } .danger { color: #ef4444; }
        .editable-number { cursor: pointer; border-bottom: 2px dashed #8b5cf6; display: inline-block; padding: 0 10px; }
        
        @media (max-width: 900px) {
            .input-row { flex-direction: column; align-items: stretch; gap: 12px; }
            .form-group { flex-direction: row; align-items: center; gap: 10px; width: 100%; justify-content: space-between; }
            .form-group label { margin-bottom: 0; white-space: normal; max-width: 45%; flex-shrink: 0; text-align: left; }
            .form-group input, .form-group select { flex: 1; width: 10% !important; }
            .action-buttons { flex-direction: column; align-items: stretch; margin-top: 10px; }
            .action-buttons button { width: 100%; padding: 12px; margin-bottom: 5px; font-size: 18px;}
            .status-text { text-align: center; margin-left: 0; margin-top: 5px; display: block; }
            .dashboard { grid-template-columns: 1fr; }
            .card { padding: 25px 15px; min-height: auto;}
            .value { font-size: 75px; } .rate-value { font-size: 95px; } .time-value { font-size: 65px; }
            .btn-add { width: 100px; height: 100px; font-size: 40px; }
        }

        #authOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #0b0f19; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .auth-box { background: rgba(30, 41, 59, 0.9); border: 2px solid #38bdf8; padding: 30px 40px; border-radius: 15px; box-shadow: 0 0 30px rgba(56, 189, 248, 0.3); text-align: center; }
        .auth-box h2 { color: #00e5ff; margin-top: 0; font-size: 28px; letter-spacing: 2px; }
        .auth-box input { font-size: 30px; letter-spacing: 10px; width: 150px; text-align: center; margin: 15px 0; }
        .auth-box button { font-size: 20px; padding: 10px 40px; width: 100%; margin-bottom: 10px;}
        .role-hint { color: #94a3b8; font-size: 14px; margin-top: 10px; border-top: 1px dashed #475569; padding-top: 10px;}
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="auth-box">
            <h2 id="authTitle">🔒 智能系统登入</h2>
            <p style="color: #cbd5e1;">请输入您的专属通行码</p>
            <input type="password" id="pinInput" placeholder="***" maxlength="4">
            <br>
            <button class="btn-bulk" onclick="verifyPIN()">登入系统</button>
            <p id="pinError" style="color: #ef4444; display: none; margin-top: 10px; font-weight: bold;">❌ 密码错误，请重试</p>
            <div class="role-hint">
                <span style="color:#00e5ff;">车间执行输入 888</span> | 
                <span style="color:#f472b6;">生管排产输入 6666</span>
            </div>
        </div>
    </div>

    <h1 id="mainTitle">⚡ 智能生产线系统 ⚡</h1>
    <div id="megaOrderDisplay" class="mega-order-display"></div>

    <div class="panel">
        <div class="input-row">
            <div class="form-group"><label>📅 柬埔寨日期:</label><input type="text" id="dateInput" class="long-input"></div>
            <div class="form-group"><label>🏭 工厂:</label>
                <select id="factoryInput" class="short-input">
                    <option value="" disabled selected>请选择...</option><option value="LY">LY</option><option value="LFY">LFY</option>
                </select>
            </div>
            <div class="form-group"><label>🏭 线别:</label>
                <select id="lineInput" class="short-input" style="width: 140px;">
                    <option value="" disabled selected>请选择...</option>
                    <optgroup label="成型"><option value="成型A">成型A</option><option value="成型B">成型B</option><option value="成型C">成型C</option><option value="成型D">成型D</option><option value="成型E">成型E</option><option value="成型F">成型F</option></optgroup>
                    <optgroup label="针车"><option value="针车1">针车1</option><option value="针车2">针车2</option><option value="针车3">针车3</option><option value="针车4">针车4</option><option value="针车5">针车5</option><option value="针车6">针车6</option></optgroup>
                </select>
            </div>
            
            <div class="form-group" id="workerFetchGroup">
                <button class="btn-fetch" onclick="fetchPlan()">🔍 获取今日排产</button>
            </div>
        </div>
        
        <div class="input-row">
            <div class="form-group"><label>🏷️ 品牌:</label><input type="text" id="brandInput" class="long-input"></div>
            <div class="form-group"><label>📄 单号:</label><input type="text" id="orderInput" class="long-input"></div>
            <div class="form-group"><label>⏱️ 开工时间:</label><input type="time" id="startTimeInput" class="short-input"></div>
            <div class="form-group"><label>📈 100%POH:</label><input type="number" id="poh" class="short-input" step="0.01" min="0"></div>
            <div class="form-group"><label>👥 员工/班组:</label><input type="number" id="workers" class="short-input" min="1"></div>
        </div>

        <div class="input-row" style="margin-top: 15px; border-top: 1px dashed #334155; padding-top: 15px;">
            
            <div class="action-buttons" id="pmcControls" style="display: none; justify-content: center; width: 100%;">
                <button class="btn-publish" onclick="publishPlan()">💾 锁定并发布排产至车间</button>
                <button class="btn-reset" onclick="location.reload()" style="margin-left: 20px;">🔄 清空重填</button>
            </div>

            <div class="action-buttons" id="workerControls" style="display: none;">
                <button class="btn-start" id="startBtn" onclick="startProduction()" disabled style="opacity: 0.5;">▶️ 开始生产</button>
                <button class="btn-stop" id="pauseBtn" onclick="togglePause()" disabled style="opacity: 0.5;">⏸️ 暂停</button>
                <button class="btn-end" id="endBtn" onclick="endProduction()" disabled style="opacity: 0.5;">⏹️ 结束</button>
                <button class="btn-reset" onclick="resetProduction()">🗑️ 清除画面</button>
                <span class="status-text" id="statusText">系统状态：请先获取排产</span>
            </div>
        </div>
    </div>

    <div id="productionDashboardArea" style="display: none;">
        <div class="top-dashboard"><div class="card top-card"><h2>📈 实时达标率</h2><div class="value rate-value" id="achievementRate">0%</div></div></div>
        <div class="dashboard">
            <div class="card"><h2>⏱️ 累计运行时间</h2><div class="value time-value" id="elapsedTimeDisplay">0.00 <span class="time-unit">小时</span><br><span class="time-sub">(0.0 分钟)</span></div></div>
            <div class="card"><h2>🎯 严格预期产量</h2><div class="value" id="expectedOutput" style="color: #f472b6;">0</div></div>
            <div class="card">
                <h2>📦 实际达成产量 (点击数字修改)</h2>
                <div class="value editable-number" id="actualOutput" style="color: #8b5cf6;" onclick="editActualOutput()">0</div>
                <div><button class="btn-add" onclick="addOutput(1)">+1</button></div>
                <div class="manual-entry"><input type="number" id="manualValue" class="manual-input" value="10"><button class="btn-bulk" onclick="addBulkOutput()">➕ 增加</button></div>
            </div>
        </div>
    </div>

    <script>
        const WORKER_PIN = "888";
        const PMC_PIN = "6666";
        let currentRole = ""; // 'WORKER' 或 'PMC'

        // ==========================================
        // 🔐 角色鉴权与 UI 切换
        // ==========================================
        function verifyPIN() {
            let input = document.getElementById('pinInput').value;
            if (input === WORKER_PIN) {
                currentRole = "WORKER";
                setupUIForRole();
                document.getElementById('authOverlay').style.display = 'none';
            } else if (input === PMC_PIN) {
                currentRole = "PMC";
                setupUIForRole();
                document.getElementById('authOverlay').style.display = 'none';
            } else {
                document.getElementById('pinError').style.display = 'block';
                document.getElementById('pinInput').value = '';
            }
        }
        document.getElementById('pinInput').addEventListener("keypress", function(e) { if (e.key === "Enter") verifyPIN(); });

        function setupUIForRole() {
            document.getElementById('dateInput').value = getCambodiaDateString();

            if (currentRole === "PMC") {
                // PMC 界面设定
                let title = document.getElementById('mainTitle');
                title.innerHTML = "⚙️ 产线排产端 - 生管专用";
                title.className = "pmc-header";
                
                document.getElementById('workerFetchGroup').style.display = 'none';
                document.getElementById('pmcControls').style.display = 'flex';
                document.getElementById('workerControls').style.display = 'none';
                document.getElementById('productionDashboardArea').style.display = 'none';
                
                // 解锁所有输入框供 PMC 填写 (除了日期强制锁定为柬埔寨今天，防止填错日子)
                document.getElementById('dateInput').disabled = true;
                document.getElementById('factoryInput').disabled = false;
                document.getElementById('lineInput').disabled = false;
                document.getElementById('brandInput').disabled = false;
                document.getElementById('orderInput').disabled = false;
                document.getElementById('startTimeInput').disabled = false;
                document.getElementById('poh').disabled = false;
                document.getElementById('workers').disabled = false;
                
            } else if (currentRole === "WORKER") {
                // 车间界面设定
                document.getElementById('mainTitle').innerHTML = "⚡ 产线执行端 - 现场作业";
                
                document.getElementById('workerFetchGroup').style.display = 'block';
                document.getElementById('pmcControls').style.display = 'none';
                document.getElementById('workerControls').style.display = 'flex';
                document.getElementById('productionDashboardArea').style.display = 'block';
                
                // 锁定除工厂和线别外的所有输入框
                document.getElementById('dateInput').disabled = true;
                document.getElementById('factoryInput').disabled = false;
                document.getElementById('lineInput').disabled = false;
                
                document.getElementById('brandInput').disabled = true;
                document.getElementById('orderInput').disabled = true;
                document.getElementById('startTimeInput').disabled = true;
                document.getElementById('poh').disabled = true;
                document.getElementById('workers').disabled = true;
                
                document.getElementById('brandInput').placeholder = "等待载入";
                document.getElementById('orderInput').placeholder = "等待载入";
            }
        }

        // 柬埔寨时区时间辅助函数
        function getCambodiaDateString() {
            let formatter = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Phnom_Penh', year: 'numeric', month: '2-digit', day: '2-digit' });
            return formatter.format(new Date());
        }
        function getCambodiaTimestamp(dateStr, timeStr) {
            return new Date(`${dateStr}T${timeStr}:00+07:00`).getTime();
        }

        // ==========================================
        // Firebase 设定 (⚠️ 请填入你的 Key)
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDqZ1g_Rnb-qf0ij0Y53PyGJgzYoWDVeKk",
            authDomain: "factory-mes-2026.firebaseapp.com",
            databaseURL: "https://factory-mes-2026-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "factory-mes-2026",
            storageBucket: "factory-mes-2026.firebasestorage.app",
            messagingSenderId: "710873291817",
            appId: "1:710873291817:web:92ea2aadc4dd895fb19038"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let actualCount = 0; let timerInterval = null; 
        let isRunning = false; let isPaused = false; let isEnded = false;
        let customStartDateMs = null; let pauseDateMs = null; 
        let targetPoh = 0; let targetWorkers = 0; let dbRefPath = null;

        // ==========================================
        // ⚙️ [PMC 专属功能] - 锁定并发布排产
        // ==========================================
        function publishPlan() {
            let dateVal = document.getElementById('dateInput').value;
            let factoryVal = document.getElementById('factoryInput').value;
            let lineVal = document.getElementById('lineInput').value;
            let brandVal = document.getElementById('brandInput').value;
            let orderVal = document.getElementById('orderInput').value;
            let timeVal = document.getElementById('startTimeInput').value;
            let pohVal = parseFloat(document.getElementById('poh').value);
            let workersVal = parseInt(document.getElementById('workers').value);

            if (!factoryVal || !lineVal || !brandVal || !orderVal || !timeVal || isNaN(pohVal) || isNaN(workersVal)) {
                alert("❌ 请填妥所有排产资料，不可留空！"); return;
            }

            dbRefPath = `production_data/${dateVal}/${factoryVal}_${lineVal}`;

            // 检查是否覆盖已有数据
            db.ref(dbRefPath).once('value').then(snap => {
                if (snap.exists() && snap.val().status !== "STANDBY" && snap.val().status !== "OFFLINE") {
                    if(!confirm("⚠️ 警告：该产线在今日已有开工数据！\n强制发布将覆盖其进度并将其重置为【待命】状态，确定要覆写吗？")) return;
                }
                
                db.ref(dbRefPath).set({
                    factory: factoryVal, line: lineVal,
                    brand: brandVal, order: orderVal,
                    startTime: timeVal, poh: pohVal, workers: workersVal,
                    actualOutput: 0, expectedOutput: 0, achievementRate: 0, elapsedMins: 0,
                    status: "STANDBY",
                    lastUpdate: new Date().toLocaleTimeString('zh-CN', { timeZone: 'Asia/Phnom_Penh' })
                }).then(() => {
                    alert("✅ 排产发布成功！\n车间前线现在可以点击「获取今日排产」拉取此计划。");
                });
            });
        }

        // ==========================================
        // ⚡ [车间专属功能] - 执行生产
        // ==========================================
        function fetchPlan() {
            let dateVal = document.getElementById('dateInput').value;
            let factoryVal = document.getElementById('factoryInput').value;
            let lineVal = document.getElementById('lineInput').value;
            
            if (!factoryVal || !lineVal) { alert("请先选择工厂和线别！"); return; }

            dbRefPath = `production_data/${dateVal}/${factoryVal}_${lineVal}`;
            db.ref(dbRefPath).once('value').then((snapshot) => {
                if (!snapshot.exists()) {
                    alert("⚠️ 生管 (PMC) 尚未为这条产线建立今日的排产计划！\n请联络生管部门。");
                    return;
                }
                let data = snapshot.val();
                
                document.getElementById('brandInput').value = data.brand || '';
                document.getElementById('orderInput').value = data.order || '';
                document.getElementById('startTimeInput').value = data.startTime || '';
                document.getElementById('poh').value = data.poh || 0;
                document.getElementById('workers').value = data.workers || 0;
                
                targetPoh = parseFloat(data.poh); targetWorkers = parseInt(data.workers);
                actualCount = parseInt(data.actualOutput) || 0;
                document.getElementById('actualOutput').innerText = actualCount;

                if (data.status === "STANDBY") {
                    document.getElementById('startBtn').disabled = false;
                    document.getElementById('startBtn').style.opacity = "1";
                    document.getElementById('statusText').innerHTML = `系统状态：<span style="color:#facc15;">⚪ 待命 (已获取排产)</span>`;
                    alert("✅ 成功获取排产计划！请在准备好时点击「开始生产」。");
                } else {
                    restoreSession(data, dateVal);
                }
            });
        }

        function restoreSession(data, dateVal) {
            if (data.status === "STOPPED") {
                alert("⚠️ 该产线已【结束】生产，数据已冻结。");
                isEnded = true; 
                document.getElementById('statusText').innerHTML = `系统状态：<span style="color:#ef4444;">🔴 已结束</span>`;
                beginRunLogic(dateVal, data.startTime, data.factory, data.line, true);
                return;
            }
            if (confirm(`📡 寻找到运行中纪录 (目前产量: ${data.actualOutput})！是否直接恢复？`)) {
                beginRunLogic(dateVal, data.startTime, data.factory, data.line, false);
                if (data.status === "PAUSED") togglePause(); 
            }
        }

        function startProduction() {
            if (isRunning || isPaused || isEnded) return; 
            let dateVal = document.getElementById('dateInput').value;
            let factoryVal = document.getElementById('factoryInput').value;
            let lineVal = document.getElementById('lineInput').value;
            let timeVal = document.getElementById('startTimeInput').value;
            
            if (!timeVal) { alert("开工时间为空，请重新获取排产！"); return; }
            beginRunLogic(dateVal, timeVal, factoryVal, lineVal, false);
        }

        function beginRunLogic(dateVal, timeVal, factoryVal, lineVal, isForceStop) {
            customStartDateMs = getCambodiaTimestamp(dateVal, timeVal);
            if (customStartDateMs > Date.now()) { alert("开工时间不能晚于现在！"); return; }

            document.getElementById('factoryInput').disabled = true; document.getElementById('lineInput').disabled = true;
            document.querySelector('.btn-fetch').disabled = true; document.querySelector('.btn-fetch').style.opacity = "0.5";

            isRunning = !isForceStop; isPaused = false; isEnded = isForceStop; pauseDateMs = null;
            document.getElementById('startBtn').disabled = true; document.getElementById('startBtn').style.opacity = "0.5";
            
            if (!isForceStop) {
                document.getElementById('pauseBtn').disabled = false; document.getElementById('pauseBtn').style.opacity = "1";
                document.getElementById('endBtn').disabled = false; document.getElementById('endBtn').style.opacity = "1";
                document.getElementById('statusText').innerHTML = `系统状态：<span style="color:#10b981;">🟢 运行中</span>`;
                
                db.ref(dbRefPath).onDisconnect().update({ status: "OFFLINE", lastUpdate: "离线" });
                timerInterval = setInterval(updateDashboard, 1000);
            }
            
            let megaBanner = document.getElementById('megaOrderDisplay');
            megaBanner.style.display = 'block';
            megaBanner.innerHTML = `📅 ${dateVal} &nbsp;|&nbsp; 🏭 ${factoryVal} - ${lineVal} &nbsp;|&nbsp; ⭐ 品牌: ${document.getElementById('brandInput').value} ⭐`;

            updateDashboard();
        }

        function togglePause() {
            if (isEnded) return;
            let pauseBtn = document.getElementById('pauseBtn');
            if (isRunning) {
                clearInterval(timerInterval);
                isRunning = false; isPaused = true; pauseDateMs = Date.now();
                pauseBtn.innerHTML = "▶️ 继续"; pauseBtn.style.background = "linear-gradient(135deg, #3b82f6, #2563eb)"; 
                document.getElementById('statusText').innerHTML = `系统状态：<span style="color:#facc15;">🟡 已暂停</span>`;
                updateDashboard();
            } else if (isPaused) {
                let pauseDuration = Date.now() - pauseDateMs; 
                customStartDateMs += pauseDuration; 
                isRunning = true; isPaused = false; pauseDateMs = null;
                pauseBtn.innerHTML = "⏸️ 暂停"; pauseBtn.style.background = ""; 
                document.getElementById('statusText').innerHTML = `系统状态：<span style="color:#10b981;">🟢 运行中</span>`;
                timerInterval = setInterval(updateDashboard, 1000);
                updateDashboard();
            }
        }

        function endProduction() {
            if (isEnded) return;
            if (confirm("确定要【结束】今日此线生产吗？\n结束后状态将变红，不可再改。")) {
                clearInterval(timerInterval);
                isRunning = false; isPaused = false; isEnded = true;
                db.ref(dbRefPath).onDisconnect().cancel();
                document.getElementById('pauseBtn').disabled = true; document.getElementById('pauseBtn').style.opacity = "0.5";
                document.getElementById('endBtn').disabled = true; document.getElementById('endBtn').style.opacity = "0.5";
                document.getElementById('statusText').innerHTML = `系统状态：<span style="color:#ef4444;">🔴 已结束</span>`;
                updateDashboard();
            }
        }

        function pushDataToCloud(elapsedMins, expectedOutput, rate) {
            if(!isRunning && !isPaused && !isEnded) return;
            let statusStr = "RUNNING";
            if (isEnded) statusStr = "STOPPED"; else if (isPaused) statusStr = "PAUSED";
            
            db.ref(dbRefPath).update({
                actualOutput: actualCount, expectedOutput: expectedOutput,
                achievementRate: rate, elapsedMins: elapsedMins,
                status: statusStr,
                lastUpdate: new Date().toLocaleTimeString('zh-CN', { timeZone: 'Asia/Phnom_Penh' })
            });
        }

        function addOutput(amount) {
            if (isEnded) { alert("此线已结束生产！"); return; }
            if (!isRunning) { alert(isPaused ? "产线暂停中！" : "未开始！"); return; }
            actualCount += amount; if (actualCount < 0) actualCount = 0; 
            document.getElementById('actualOutput').innerText = actualCount; updateDashboard();
        }

        function addBulkOutput() { let val = parseInt(document.getElementById('manualValue').value); if (!isNaN(val)) addOutput(val); }
        function editActualOutput() {
            if (isEnded || (!isRunning && !isPaused)) return;
            let newVal = prompt("输入实际达成产量:", actualCount);
            if (newVal !== null && !isNaN(parseInt(newVal)) && parseInt(newVal) >= 0) {
                actualCount = parseInt(newVal); document.getElementById('actualOutput').innerText = actualCount; updateDashboard();
            }
        }

        function updateDashboard() {
            if (!customStartDateMs) return;
            let calculateTimeMs = (isPaused || isEnded) ? (pauseDateMs || Date.now()) : Date.now();
            if (isEnded && !pauseDateMs) calculateTimeMs = Date.now(); 

            let elapsedMins = (calculateTimeMs - customStartDateMs) / 60000;
            if(elapsedMins < 0) elapsedMins = 0;
            let elapsedHours = elapsedMins / 60;
            
            document.getElementById('elapsedTimeDisplay').innerHTML = `${elapsedHours.toFixed(2)} <span class="time-unit">小时</span><br><span class="time-sub">(${elapsedMins.toFixed(1)} 分钟)</span>`;
            let expectedOutput = Math.floor((targetPoh * targetWorkers / 60) * elapsedMins);
            document.getElementById('expectedOutput').innerText = expectedOutput;

            let rate = 0; if (expectedOutput > 0) rate = (actualCount / expectedOutput) * 100;
            
            let rateElement = document.getElementById('achievementRate');
            rateElement.innerText = rate.toFixed(1) + "%";
            rateElement.className = "value rate-value"; 
            if (elapsedMins > 1) { 
                if (rate >= 100) rateElement.classList.add("good");
                else if (rate >= 90) rateElement.classList.add("warning");
                else rateElement.classList.add("danger");
            }
            pushDataToCloud(elapsedMins, expectedOutput, rate);
        }

        function resetProduction() { if(confirm("确定清除画面？(云端资料将保留)")) { if(dbRefPath) db.ref(dbRefPath).onDisconnect().cancel(); location.reload(); } }
    </script>
</body>
</html>
