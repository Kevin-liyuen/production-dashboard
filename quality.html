<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ 质量输入端 - 智能生产线</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #0b0f19; color: #e2e8f0; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .panel { background: rgba(30, 41, 59, 0.8); border: 1px solid #334155; padding: 15px 20px; border-radius: 12px; width: 100%; max-width: 600px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        h1 { color: #facc15; text-shadow: 0 0 15px rgba(250, 204, 21, 0.5); text-align: center; margin: 0 0 10px 0; font-size: 24px;}
        .form-group { margin-bottom: 12px; display: flex; align-items: center; gap: 10px; justify-content: space-between; }
        
        input, select, button { background: #0f172a; color: #00e5ff; border: 1px solid #38bdf8; padding: 8px; border-radius: 6px; font-weight: bold; font-size: 15px;}
        input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus, input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 50px #0f172a inset !important;
            -webkit-text-fill-color: #00e5ff !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        .info-display { background: rgba(56, 189, 248, 0.1); padding: 12px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #38bdf8; text-align: center; font-size: 16px;}
        .patrol-input { font-size: 55px !important; text-align: center; width: 200px; height: 65px; padding: 5px; color: #ef4444 !important; background: #0f172a !important; border: 3px solid #ef4444 !important; border-radius: 10px; font-weight: bold; margin: 10px 0;}
        .c-good { color: #10b981; text-shadow: 0 0 20px rgba(16, 185, 129, 0.5); }
        .c-warning { color: #facc15; text-shadow: 0 0 20px rgba(250, 204, 21, 0.5); }
        .c-danger { color: #ef4444; text-shadow: 0 0 20px rgba(239, 68, 68, 0.5); }
        .btn-submit-patrol { background: linear-gradient(135deg, #ef4444, #b91c1c); color: white; font-size: 20px; padding: 12px 20px; margin-top: 5px; width: 100%; box-shadow: 0 0 15px rgba(239, 68, 68, 0.5); cursor: pointer; border: none; border-radius: 8px;}
        .btn-fetch { background: #3b82f6; color: white; width: 100%; margin-top: 5px; cursor: pointer;}
        #authOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b0f19; z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .last-update-hint { color: #10b981; font-weight: bold; margin-top: 5px; font-size: 15px; display: none;}
        .history-text { color: #cbd5e1; font-size: 15px; margin-top: 5px; background: rgba(15, 23, 42, 0.8); padding: 6px; border-radius: 6px; display: inline-block;}
        
        .sync-box { margin-top: 10px; padding: 10px; background: rgba(0, 229, 255, 0.05); border-radius: 8px; border: 1px dashed #00e5ff; }
    </style>
</head>
<body>
    <div id="authOverlay">
        <div class="panel" style="text-align: center;">
            <h2 style="color: #facc15;">🔒 质量检测授权</h2>
            <input type="password" id="pinInput" placeholder="请输入密码" style="font-size: 20px; text-align: center; width: 200px; margin: 15px 0;">
            <br><button class="btn-fetch" onclick="verifyQC()" style="width: 150px; font-size: 18px;">进入系统</button>
            <p id="pinError" style="color: #ef4444; display: none; margin-top: 10px; font-weight: bold;">❌ 密码错误</p>
        </div>
    </div>

    <h1>🛡️ QC 巡线不良数打卡系统</h1>
    <div class="panel">
        <div class="form-group"><label style="color:#94a3b8;">📅 日期:</label><input type="date" id="dateInput" style="flex-grow: 1;"></div>
        <div class="form-group"><label style="color:#94a3b8;">🏭 厂线:</label>
            <select id="factoryInput"><option value="LY">LY</option><option value="LFY">LFY</option></select>
            <select id="lineInput" style="flex-grow: 1;">
                <optgroup label="成型"><option value="成型A">成型A</option><option value="成型B">成型B</option><option value="成型C">成型C</option><option value="成型D">成型D</option><option value="成型E">成型E</option><option value="成型F">成型F</option></optgroup>
                <optgroup label="针车"><option value="针车1">针车1</option><option value="针车2">针车2</option><option value="针车3">针车3</option><option value="针车4">针车4</option><option value="针车5">针车5</option><option value="针车6">针车6</option><option value="针车7">针车7</option><option value="针车8">针车8</option><option value="针车9">针车9</option><option value="针车10">针车10</option><option value="针车11">针车11</option><option value="针车12">针车12</option><option value="针车13">针车13</option><option value="针车14">针车14</option><option value="针车15">针车15</option><option value="针车16">针车16</option><option value="针车17">针车17</option><option value="针车18">针车18</option><option value="针车19">针车19</option><option value="针车20">针车20</option><option value="针车21">针车21</option><option value="针车22">针车22</option><option value="针车23">针车23</option><option value="针车24">针车24</option></optgroup>
                <optgroup label="组底"><option value="组底1">组底1</option><option value="组底2">组底2</option><option value="组底3">组底3</option><option value="组底4">组底4</option><option value="组底5">组底5</option></optgroup>
            </select>
        </div>
        <button class="btn-fetch" onclick="fetchOrderInfo()">🔍 获取并锁定此线</button>

        <div id="orderInfo" class="info-display" style="display:none;">
            <div id="infoText">载入中...</div>
        </div>

        <div id="inputArea" style="display:none; text-align: center; border-top: 1px dashed #334155; padding-top: 15px;">
            <div style="color: #94a3b8; font-weight: bold; font-size: 15px;">输入此刻累积不良总数</div>
            <input type="number" id="patrolDefectInput" class="patrol-input" value="0" min="0">
            <div id="ratePreview" style="font-size: 22px; font-weight: bold; font-family: monospace; margin-bottom: 5px;">当前不良率: 0.0%</div>
            <div class="history-text" id="historyText">上次打卡: -- | 不良数: 0</div>
            <div style="margin-top: 10px;">
                <button class="btn-submit-patrol" onclick="submitDefectSnapshot()">💾 打卡：提交本小时不良数</button>
            </div>
            <div id="lastUpdateHint" class="last-update-hint">✅ 质量数据打卡成功！</div>
        </div>
    </div>

    <script>
        function hashPIN(str) { let hash = 0; for (let i = 0; i < str.length; i++) { hash = (hash << 5) - hash + str.charCodeAt(i); hash |= 0; } return hash.toString(); }
        const QC_HASH = "1634338"; // 5821
        function verifyQC() {
            let input = document.getElementById('pinInput').value;
            if (hashPIN(input) === QC_HASH) document.getElementById('authOverlay').style.display = 'none';
            else { document.getElementById('pinError').style.display = 'block'; document.getElementById('pinInput').value = ''; }
        }
        document.getElementById('pinInput').addEventListener("keypress", (e) => { if (e.key === "Enter") verifyQC(); });

        const firebaseConfig = { apiKey: "AIzaSyDqZ1g_Rnb-qf0ij0Y53PyGJgzYoWDVeKk", authDomain: "factory-mes-2026.firebaseapp.com", databaseURL: "https://factory-mes-2026-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "factory-mes-2026" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); const db = firebase.database();

        let actualOutput = 0; let dbPath = ""; let currentListener = null;

        window.onload = () => {
            let formatter = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Phnom_Penh', year: 'numeric', month: '2-digit', day: '2-digit' });
            document.getElementById('dateInput').value = formatter.format(new Date());
        };

        function fetchOrderInfo() {
            let date = document.getElementById('dateInput').value; let factory = document.getElementById('factoryInput').value; let line = document.getElementById('lineInput').value;
            dbPath = `production_data/${date}/${factory}_${line}`;
            if (currentListener) currentListener.off(); 

            currentListener = db.ref(dbPath);
            currentListener.on('value', snap => {
                if (!snap.exists() || snap.val().status === "STANDBY") { alert("❌ 找不到排产资料，或该线尚未开工！"); if (currentListener) currentListener.off(); return; }
                let data = snap.val();
                document.getElementById('orderInfo').style.display = "block"; document.getElementById('inputArea').style.display = "block";
                
                actualOutput = data.actualOutput || 0;
                let elapsedHours = (data.elapsedMins / 60).toFixed(2);
                let prodTimeStr = data.lastReportMs ? new Date(data.lastReportMs).toLocaleTimeString('zh-CN', { timeZone: 'Asia/Phnom_Penh' }) : "尚未打卡";
                
                document.getElementById('infoText').innerHTML = `
                    <div style="color:#cbd5e1; font-size:15px;">品牌: <b>${data.brand}</b> | 单号: <b>${data.order}</b></div>
                    <div class="sync-box">
                        <div style="font-size: 14px; color: #94a3b8;">对应前线报产时间: <span style="color:#facc15">${prodTimeStr}</span> <small>(运行 ${elapsedHours} 小时)</small></div>
                        <div style="margin-top: 5px; font-size: 15px;">📦 现场报产数 (分母): <span style="color:#00e5ff; font-size: 28px; font-weight:bold; font-family: monospace; vertical-align: middle;">${actualOutput}</span></div>
                    </div>
                `;
                
                let historyTxt = data.qcLastUpdateStr ? `上次 QC 打卡: ${data.qcLastUpdateStr} | 累计不良: ${data.defectOutput || 0}` : `上次打卡: 尚未打卡 | 不良: 0`;
                document.getElementById('historyText').innerText = historyTxt;

                if (document.getElementById('patrolDefectInput').value === "0" && data.defectOutput > 0) {
                    document.getElementById('patrolDefectInput').value = data.defectOutput;
                    previewRate();
                }
            });
        }

        document.getElementById('patrolDefectInput').addEventListener('input', previewRate);

        function previewRate() {
            let def = parseInt(document.getElementById('patrolDefectInput').value) || 0;
            let rate = 0; if (actualOutput > 0) rate = (def / actualOutput) * 100;
            let el = document.getElementById('ratePreview');
            el.innerText = `当前不良率: ${rate.toFixed(1)}%`;
            if (rate >= 8) el.className = "c-danger"; else if (rate >= 6) el.className = "c-warning"; else el.className = "c-good";
        }

        function submitDefectSnapshot() {
            let def = parseInt(document.getElementById('patrolDefectInput').value);
            if (isNaN(def) || def < 0) { alert("请输入有效数字！"); return; }
            
            let updateTimeStr = new Date().toLocaleTimeString('zh-CN', { timeZone: 'Asia/Phnom_Penh' }) + " (QC打卡)";
            document.getElementById('historyText').innerText = `上次 QC 打卡: ${updateTimeStr} | 累计不良: ${def}`;

            db.ref(dbPath).update({
                defectOutput: def, 
                qcLastUpdateStr: updateTimeStr,
                lastUpdateMs: Date.now(), 
                lastUpdate: updateTimeStr
            }).then(() => {
                let hint = document.getElementById('lastUpdateHint');
                hint.style.display = 'block'; setTimeout(() => hint.style.display = 'none', 3000);
            });
        }
    </script>
</body>
</html>
