<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌐 工厂全局实时监控看板</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #0b0f19; color: #e2e8f0; margin: 0; padding: 20px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; border-bottom: 2px solid #334155; padding-bottom: 15px;}
        h1 { color: #00e5ff; text-shadow: 0 0 20px rgba(0, 229, 255, 0.8); letter-spacing: 4px; font-size: 28px; margin: 0;}
        .filters { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .filter-group { display: flex; align-items: center; background: rgba(30, 41, 59, 0.8); border: 1px solid #38bdf8; border-radius: 8px; padding: 5px 10px; }
        .filter-group label { color: #facc15; font-weight: bold; margin-right: 8px; font-size: 14px;}
        .filter-group input, .filter-group select { background: transparent; color: #fff; border: none; font-size: 15px; font-weight: bold; outline: none; cursor: pointer; }
        .filter-group select option { background: #0f172a; }
        
        .view-filter { border-color: #f472b6 !important; background: rgba(244, 114, 182, 0.1) !important; }
        
        .btn-scroll { background: #3b82f6; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-scroll:hover { opacity: 0.8; }
        
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; }
        .line-card { background: rgba(30, 41, 59, 0.8); border: 1px solid #334155; border-radius: 12px; padding: 15px 20px; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.4); transition: 0.3s; display: flex; flex-direction: column;}
        .line-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.6); border-color: #38bdf8;}
        .line-header { font-size: 24px; font-weight: bold; color: #fff; border-bottom: 2px solid #334155; padding-bottom: 10px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        
        .list-container { display: flex; flex-direction: column; gap: 10px; }
        .list-row { display: flex; justify-content: space-between; align-items: center; background: rgba(30, 41, 59, 0.7); border: 1px solid #334155; padding: 12px 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: 0.3s; flex-wrap: wrap;}
        .list-row:hover { border-color: #38bdf8; background: rgba(30, 41, 59, 1); transform: scale(1.01);}
        .list-col { flex: 1; text-align: center; min-width: 100px; }
        .list-col.left { text-align: left; flex: 1.5; min-width: 180px; }
        .list-col.right { text-align: right; flex: 0.8; }
        .list-title { font-size: 12px; color: #94a3b8; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px;}
        .list-val { font-size: 22px; font-weight: bold; color: #fff; font-family: 'Courier New', Courier, monospace;}

        .status-dot { height: 16px; width: 16px; background-color: #10b981; border-radius: 50%; display: inline-block; box-shadow: 0 0 10px #10b981; animation: blink 1.5s infinite;}
        .status-dot.paused { background-color: #facc15; box-shadow: 0 0 10px #facc15; animation: none;} 
        .status-dot.stopped { background-color: #ef4444; box-shadow: 0 0 10px #ef4444; animation: none;} 
        .status-dot.offline { background-color: #475569; box-shadow: 0 0 10px #475569; animation: none;} 
        .status-dot.standby { background-color: #f8fafc; box-shadow: 0 0 10px #f8fafc; animation: none;} 
        @keyframes blink { 50% { opacity: 0.4; } }

        .data-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 15px; color: #94a3b8; }
        .data-value { font-size: 24px; font-weight: bold; color: #fff; font-family: 'Courier New', Courier, monospace;}
        
        .rate-container { text-align: center; margin-top: auto; padding-top: 10px; border-top: 1px dashed #334155; }
        .rate-title { font-size: 13px; color: #94a3b8; }
        .rate-big-value { font-size: 50px; font-weight: bold; line-height: 1.1; margin-top: 5px; font-family: 'Courier New', Courier, monospace; }
        
        .good { color: #10b981; text-shadow: 0 0 15px rgba(16, 185, 129, 0.6); }
        .warning { color: #facc15; text-shadow: 0 0 15px rgba(250, 204, 21, 0.6); }
        .danger { color: #ef4444; text-shadow: 0 0 15px rgba(239, 68, 68, 0.6); }
        .defect-text { color: #ef4444; text-shadow: 0 0 15px rgba(239, 68, 68, 0.6); font-family: 'Courier New', monospace; font-weight: bold;}
        
        .standby-text { color: #94a3b8; font-size: 24px; margin-top: 15px; text-align: center;}
        #noDataMsg { text-align: center; font-size: 24px; color: #64748b; margin-top: 100px; display: none; }

        #authOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b0f19; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .auth-box { background: rgba(30, 41, 59, 0.9); border: 2px solid #00e5ff; padding: 40px; border-radius: 15px; text-align: center; box-shadow: 0 0 30px rgba(0, 229, 255, 0.3);}
        .auth-box input { background: #0f172a; color: #fff; border: 1px solid #00e5ff; font-size: 20px; text-align: center; padding: 10px; margin: 15px 0; border-radius: 6px; width: 220px; }
        .auth-box button { background: #00e5ff; color: #0b0f19; border: none; font-size: 20px; padding: 10px 40px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%;}
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="auth-box">
            <h2 style="color: #00e5ff; margin-top:0;">📊 全局看板授权</h2>
            <p style="color: #94a3b8;">请输入管理者密码</p>
            <input type="password" id="pinInput" placeholder="请输入密码">
            <br>
            <button onclick="verifyBoss()">开启看板</button>
            <p id="pinError" style="color: #ef4444; display: none; margin-top: 15px; font-weight: bold;">❌ 密码错误</p>
        </div>
    </div>

    <div id="mainContent" style="display: none;">
        <div class="top-bar">
            <h1>🌐 全局实时监控</h1>
            <div class="filters">
                <div class="filter-group"><input type="date" id="viewDate"></div>
                <div class="filter-group"><select id="filterFactory"><option value="ALL">全厂</option><option value="LY">LY</option><option value="LFY">LFY</option></select></div>
                <div class="filter-group">
                    <select id="filterType">
                        <option value="ALL">全类型</option>
                        <option value="成型">成型</option>
                        <option value="针车">针车</option>
                        <option value="组底">组底</option>
                    </select>
                </div>
                <div class="filter-group" style="border-color: #facc15;"><label>🔽</label><select id="sortBy"><option value="line">默认排序</option><option value="rate">达标率优先</option><option value="defect">不良率优先</option></select></div>
                
                <div class="filter-group view-filter">
                    <label style="color: #f472b6;">👁️ 视角</label>
                    <select id="viewMode" style="color: #f472b6;">
                        <option value="ALL">综合看板 (产量+质量)</option>
                        <option value="QTY">产量看板 (隐藏不良)</option>
                        <option value="QUAL">质量看板 (专注不良)</option>
                        <option value="SIMPLE">📝 简易列表 (高密度排版)</option>
                    </select>
                </div>
                
                <button id="btnAutoScroll" class="btn-scroll" onclick="toggleAutoScroll()">🔄</button>
            </div>
        </div>
        <div id="noDataMsg">📡 正在搜寻数据... </div>
        <div class="grid-container" id="cardsContainer"></div>
    </div>

    <script>
        function hashPIN(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) { hash = (hash << 5) - hash + str.charCodeAt(i); hash |= 0; }
            return hash.toString();
        }
        const BOSS_HASH = "1690049"; // 7415

        function verifyBoss() {
            let input = document.getElementById('pinInput').value;
            if (hashPIN(input) === BOSS_HASH) {
                document.getElementById('authOverlay').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                initBoard(); // 登入成功才初始化数据加载
            } else {
                document.getElementById('pinError').style.display = 'block';
                document.getElementById('pinInput').value = '';
            }
        }
        document.getElementById('pinInput').addEventListener("keypress", (e) => { if (e.key === "Enter") verifyBoss(); });

        const firebaseConfig = {
            apiKey: "AIzaSyDqZ1g_Rnb-qf0ij0Y53PyGJgzYoWDVeKk",
            authDomain: "factory-mes-2026.firebaseapp.com",
            databaseURL: "https://factory-mes-2026-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "factory-mes-2026"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentListenerRef = null; let globalData = null; 

        function initBoard() {
            setInterval(renderCards, 5000); 
            let formatter = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Phnom_Penh', year: 'numeric', month: '2-digit', day: '2-digit' });
            document.getElementById('viewDate').value = formatter.format(new Date());
            loadDataForDate(document.getElementById('viewDate').value);
        }

        let scrollInterval = null; let isAutoScrolling = false;
        function toggleAutoScroll() {
            isAutoScrolling = !isAutoScrolling;
            let btn = document.getElementById('btnAutoScroll');
            if (isAutoScrolling) {
                btn.innerHTML = "⏸️"; btn.style.background = "#f59e0b"; 
                scrollInterval = setInterval(() => {
                    window.scrollBy(0, 1);
                    if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 2) window.scrollTo(0, 0);
                }, 30);
            } else {
                btn.innerHTML = "🔄"; btn.style.background = "#3b82f6"; clearInterval(scrollInterval);
            }
        }

        document.getElementById('filterFactory').addEventListener('change', renderCards);
        document.getElementById('filterType').addEventListener('change', renderCards);
        document.getElementById('sortBy').addEventListener('change', renderCards);
        document.getElementById('viewMode').addEventListener('change', renderCards); 
        document.getElementById('viewDate').addEventListener('change', (e) => loadDataForDate(e.target.value));

        function loadDataForDate(targetDate) {
            if (currentListenerRef) currentListenerRef.off();
            currentListenerRef = db.ref('production_data/' + targetDate);
            currentListenerRef.on('value', (snapshot) => {
                globalData = snapshot.val(); renderCards();
            });
        }

        function renderCards() {
            const container = document.getElementById('cardsContainer'); const noDataMsg = document.getElementById('noDataMsg');
            if (!globalData) { container.innerHTML = ''; noDataMsg.style.display = 'block'; return; }
            
            let linesArray = Object.values(globalData);
            let fFactory = document.getElementById('filterFactory').value;
            let fType = document.getElementById('filterType').value;
            let sortBy = document.getElementById('sortBy').value;
            let viewMode = document.getElementById('viewMode').value;

            if (viewMode === "SIMPLE") {
                container.className = "list-container";
            } else {
                container.className = "grid-container";
            }

            linesArray = linesArray.filter(item => {
                if (fFactory !== "ALL" && item.factory !== fFactory) return false;
                if (fType !== "ALL" && !item.line.includes(fType)) return false;
                return true;
            });

            if (linesArray.length === 0) { container.innerHTML = ''; noDataMsg.style.display = 'block'; return; }
            noDataMsg.style.display = 'none';

            linesArray.sort((a, b) => {
                if (sortBy === "rate") return b.achievementRate - a.achievementRate;
                if (sortBy === "defect") {
                    let rateA = (a.actualOutput > 0) ? (a.defectOutput || 0) / a.actualOutput : 0;
                    let rateB = (b.actualOutput > 0) ? (b.defectOutput || 0) / b.actualOutput : 0;
                    return rateB - rateA; 
                }
                if (a.factory === b.factory) return a.line.localeCompare(b.line, undefined, {numeric: true});
                return a.factory.localeCompare(b.factory);
            });

            let newContainerHTML = ""; 

            linesArray.forEach(lineData => {
                let rateColorClass = "good";
                if (lineData.elapsedMins > 1) {
                    if (lineData.achievementRate >= 100) rateColorClass = "good";
                    else if (lineData.achievementRate >= 90) rateColorClass = "warning";
                    else rateColorClass = "danger";
                }

                let statusDotClass = "status-dot"; let statusTitle = "运行中";
                let isStale = false;
                if ((lineData.status === "RUNNING" || lineData.status === "PAUSED") && lineData.lastUpdateMs) {
                    if (Date.now() - lineData.lastUpdateMs > 90000) isStale = true; 
                }
                if (lineData.status === "STOPPED") { statusDotClass = "status-dot stopped"; statusTitle = "已结束"; } 
                else if (lineData.status === "OFFLINE" || isStale) { statusDotClass = "status-dot offline"; statusTitle = "离线 / 无响应"; }
                else if (lineData.status === "PAUSED") { statusDotClass = "status-dot paused"; statusTitle = "已暂停"; } 
                else if (lineData.status === "STANDBY") { statusDotClass = "status-dot standby"; statusTitle = "待命"; }

                let defectCount = lineData.defectOutput || 0;
                let defectRate = 0;
                if (lineData.actualOutput && lineData.actualOutput > 0) {
                    defectRate = (defectCount / lineData.actualOutput) * 100;
                }
                let defectRateStr = defectRate.toFixed(1) + '%';
                
                let defectColorClass = "good"; 
                if (defectRate >= 8) defectColorClass = "danger"; 
                else if (defectRate >= 6) defectColorClass = "warning"; 

                if (viewMode === "SIMPLE") {
                    let leftBorderColor = lineData.status === "STANDBY" ? "#94a3b8" : (rateColorClass === 'good' ? '#10b981' : (rateColorClass === 'warning' ? '#facc15' : '#ef4444'));
                    
                    let rowContent = "";
                    if (lineData.status === "STANDBY") {
                        rowContent = `<div class="list-col" style="flex: 4; text-align: center; color: #94a3b8;">⚪ 等待产线开工...</div>`;
                    } else {
                        rowContent = `
                            <div class="list-col">
                                <div class="list-title">运作时间</div>
                                <div class="list-val">${(lineData.elapsedMins / 60).toFixed(2)}h</div>
                            </div>
                            <div class="list-col">
                                <div class="list-title">预期 / 实际</div>
                                <div class="list-val">${lineData.expectedOutput} / <span style="color:#8b5cf6;">${lineData.actualOutput || 0}</span></div>
                            </div>
                            <div class="list-col">
                                <div class="list-title">达标率</div>
                                <div class="list-val ${rateColorClass}">${lineData.achievementRate.toFixed(1)}%</div>
                            </div>
                            <div class="list-col">
                                <div class="list-title">不良数 (率)</div>
                                <div class="list-val ${defectColorClass}">${defectCount} <span style="font-size:14px;">(${defectRateStr})</span></div>
                            </div>
                        `;
                    }

                    newContainerHTML += `
                        <div class="list-row" style="border-left: 5px solid ${leftBorderColor};">
                            <div class="list-col left">
                                <div style="font-size: 20px; font-weight: bold; color: #fff;">🏭 ${lineData.factory} - ${lineData.line}</div>
                                <div style="font-size: 14px; color: #38bdf8; margin-top:3px;">${lineData.brand} <small>(${lineData.order})</small></div>
                            </div>
                            ${rowContent}
                            <div class="list-col right">
                                <div class="list-title">状态</div>
                                <div style="font-size: 15px; color: #cbd5e1; font-weight:bold;"><span class="${statusDotClass}" style="vertical-align: text-top; margin-right:4px;"></span>${statusTitle}</div>
                                <div style="font-size: 11px; color: #64748b; margin-top:5px;">更新: ${lineData.lastUpdate.split(' ')[0]}</div>
                            </div>
                        </div>
                    `;
                    return; 
                }

                let contentHTML = "";
                if (lineData.status === "STANDBY") {
                    contentHTML = `<div class="rate-container"><div class="standby-text">⚪ 等待产线开工</div></div>`;
                } else {
                    let qtyBlock = `
                        <div class="data-row"><span>运作时间:</span><span>${(lineData.elapsedMins / 60).toFixed(2)} 小时</span></div>
                        <div class="data-row"><span>预期产量:</span><span class="data-value">${lineData.expectedOutput}</span></div>
                        <div class="data-row"><span>实际达成:</span><span class="data-value" style="color: #8b5cf6;">${lineData.actualOutput || 0}</span></div>
                        <div class="rate-container">
                            <div class="rate-title">达标率 (最后更新: ${lineData.lastUpdate})</div>
                            <div class="rate-big-value ${rateColorClass}">${lineData.achievementRate.toFixed(1)}%</div>
                        </div>
                    `;
                    
                    let qualBlock = `
                        <div class="data-row"><span>实际达成:</span><span class="data-value" style="color: #8b5cf6;">${lineData.actualOutput || 0}</span></div>
                        <div class="rate-container" style="border-top: 1px dashed #334155; margin-top: 15px; padding-top: 15px;">
                            <div class="rate-title">不良数 / 不良率 (最后更新: ${lineData.lastUpdate})</div>
                            <div style="margin-top: 10px;">
                                <span class="${defectColorClass}" style="font-size: 50px; font-family: 'Courier New', Courier, monospace; font-weight: bold;">${defectCount}</span>
                                <span class="${defectColorClass}" style="font-size: 70px; margin-left:10px; font-family: 'Courier New', Courier, monospace; font-weight: bold;">(${defectRateStr})</span>
                            </div>
                        </div>
                    `;
                    
                    let allBlock = `
                        <div class="data-row"><span>运作时间:</span><span>${(lineData.elapsedMins / 60).toFixed(2)} 小时</span></div>
                        <div class="data-row"><span>预期/实际:</span><span class="data-value" style="font-size: 20px;">${lineData.expectedOutput} / <span style="color: #8b5cf6;">${lineData.actualOutput || 0}</span></span></div>
                        <div style="display: flex; justify-content: space-between; margin-top: auto; border-top: 1px dashed #334155; padding-top: 10px;">
                            <div style="width: 48%; text-align: center;">
                                <div class="rate-title">达标率</div>
                                <div class="rate-big-value ${rateColorClass}" style="font-size: 40px;">${lineData.achievementRate.toFixed(1)}%</div>
                            </div>
                            <div style="width: 48%; text-align: center; border-left: 1px dashed #334155;">
                                <div class="rate-title">不良数 / 率</div>
                                <div style="line-height: 1.1; margin-top: 5px;">
                                    <span class="${defectColorClass}" style="font-size: 28px; font-family: 'Courier New', monospace; font-weight: bold;">${defectCount}</span><br>
                                    <span class="${defectColorClass}" style="font-size: 38px; font-family: 'Courier New', monospace; font-weight: bold;">${defectRateStr}</span>
                                </div>
                            </div>
                        </div>
                        <div style="font-size: 11px; color: #475569; text-align: right; margin-top: 8px;">更新: ${lineData.lastUpdate}</div>
                    `;

                    if (viewMode === "QTY") contentHTML = qtyBlock;
                    else if (viewMode === "QUAL") contentHTML = qualBlock;
                    else contentHTML = allBlock;
                }

                newContainerHTML += `
                    <div class="line-card">
                        <div class="line-header"><span>🏭 ${lineData.factory} - ${lineData.line}</span><span class="${statusDotClass}" title="${statusTitle}"></span></div>
                        <div class="data-row"><span>品牌 / 单号:</span><span style="color: #38bdf8; font-weight:bold;">${lineData.brand} <small>(${lineData.order})</small></span></div>
                        ${contentHTML}
                    </div>
                `;
            });
            
            container.innerHTML = newContainerHTML;
        }
    </script>
</body>
</html>
