<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌐 工厂全局实时监控看板</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #0b0f19; color: #e2e8f0; margin: 0; padding: 20px; }
        
        /* 顶部控制栏 */
        .top-bar { display: flex; justify-content: center; align-items: center; margin-bottom: 30px; gap: 20px; flex-wrap: wrap; }
        h1 { color: #00e5ff; text-shadow: 0 0 20px rgba(0, 229, 255, 0.8); letter-spacing: 4px; font-size: 32px; margin: 0;}
        
        /* 日期选择器美化 */
        .date-control { background: rgba(30, 41, 59, 0.8); padding: 10px 20px; border-radius: 10px; border: 1px solid #334155; display: flex; align-items: center; gap: 10px;}
        .date-control label { font-size: 18px; font-weight: bold; color: #facc15; }
        .date-control input { background-color: #0f172a; color: #fff; border: 2px solid #38bdf8; padding: 8px 15px; border-radius: 6px; font-size: 18px; font-weight: bold; outline: none; }
        
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }
        .line-card { background: rgba(30, 41, 59, 0.8); border: 1px solid #334155; border-radius: 15px; padding: 20px; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.4); transition: 0.3s; }
        .line-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.6); }

        .line-header { font-size: 26px; font-weight: bold; color: #fff; border-bottom: 2px solid #334155; padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .status-dot { height: 16px; width: 16px; background-color: #10b981; border-radius: 50%; display: inline-block; box-shadow: 0 0 10px #10b981; animation: blink 1.5s infinite;}
        .status-dot.stopped { background-color: #f59e0b; box-shadow: 0 0 10px #f59e0b; animation: none;} /* 暂停改为黄色 */
        @keyframes blink { 50% { opacity: 0.4; } }

        .data-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 18px; color: #94a3b8; }
        .data-value { font-size: 30px; font-weight: bold; color: #fff; font-family: 'Courier New', Courier, monospace;}
        
        .rate-container { text-align: center; margin-top: 20px; padding-top: 15px; border-top: 1px dashed #334155; }
        .rate-title { font-size: 16px; color: #94a3b8; }
        .rate-big-value { font-size: 65px; font-weight: bold; line-height: 1.1; margin-top: 10px; font-family: 'Courier New', Courier, monospace; }

        .good { color: #10b981; text-shadow: 0 0 15px rgba(16, 185, 129, 0.6); }
        .warning { color: #facc15; text-shadow: 0 0 15px rgba(250, 204, 21, 0.6); }
        .danger { color: #ef4444; text-shadow: 0 0 15px rgba(239, 68, 68, 0.6); }

        #noDataMsg { text-align: center; font-size: 24px; color: #64748b; margin-top: 100px; display: none; }
    </style>
</head>
<body>

    <div class="top-bar">
        <h1>🌐 全局实时监控看板</h1>
        <div class="date-control">
            <label>查看日期：</label>
            <input type="date" id="viewDate">
        </div>
    </div>
    
    <div id="noDataMsg">📡 正在搜寻数据... </div>
    <div class="grid-container" id="cardsContainer">
        </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDqZ1g_Rnb-qf0ij0Y53PyGJgzYoWDVeKk",
            authDomain: "factory-mes-2026.firebaseapp.com",
            databaseURL: "https://factory-mes-2026-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "factory-mes-2026",
            storageBucket: "factory-mes-2026.firebasestorage.app",
            messagingSenderId: "710873291817",
            appId: "1:710873291817:web:92ea2aadc4dd895fb19038"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let datePicker = document.getElementById('viewDate');
        let currentListenerRef = null;

        // 预设今天日期
        window.onload = () => {
            let today = new Date();
            datePicker.value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
            loadDataForDate(datePicker.value);
        };

        // 当老板更改日期时，重新抓取数据
        datePicker.addEventListener('change', (e) => {
            loadDataForDate(e.target.value);
        });

        function loadDataForDate(targetDate) {
            const container = document.getElementById('cardsContainer');
            const noDataMsg = document.getElementById('noDataMsg');
            container.innerHTML = '';
            noDataMsg.innerHTML = `📡 正在载入 ${targetDate} 的数据...`;
            noDataMsg.style.display = 'block';

            // 先卸载上一个日期的监听器，防止数据错乱
            if (currentListenerRef) {
                currentListenerRef.off();
            }

            currentListenerRef = db.ref('production_data/' + targetDate);
            
            currentListenerRef.on('value', (snapshot) => {
                const data = snapshot.val();
                container.innerHTML = ''; 

                if (!data) {
                    noDataMsg.innerHTML = `📭 ${targetDate} 尚未有任何产线纪录。`;
                    noDataMsg.style.display = 'block';
                    return;
                }
                noDataMsg.style.display = 'none';

                // 🌟 核心：将对象转为阵列并进行「自然排序」(工厂优先，再按线别)
                let linesArray = [];
                for (let key in data) linesArray.push(data[key]);

                linesArray.sort((a, b) => {
                    if (a.factory === b.factory) {
                        // natural sort 处理 "针车2" 和 "针车10" 的顺序问题
                        return a.line.localeCompare(b.line, undefined, {numeric: true, sensitivity: 'base'});
                    }
                    return a.factory.localeCompare(b.factory);
                });

                // 渲染卡片
                linesArray.forEach(lineData => {
                    let rateColorClass = "good";
                    if (lineData.elapsedMins > 1) {
                        if (lineData.achievementRate >= 100) rateColorClass = "good";
                        else if (lineData.achievementRate >= 90) rateColorClass = "warning";
                        else rateColorClass = "danger";
                    }

                    // 暂停状态显示黄色
                    let statusTitle = lineData.status === "PAUSED" ? "已暂停" : "运行中";
                    let statusDotClass = lineData.status === "PAUSED" ? "status-dot stopped" : "status-dot";

                    let cardHTML = `
                        <div class="line-card">
                            <div class="line-header">
                                <span>🏭 ${lineData.factory} - ${lineData.line}</span>
                                <span class="${statusDotClass}" title="${statusTitle}"></span>
                            </div>
                            <div class="data-row">
                                <span>品牌 / 单号:</span>
                                <span style="color: #38bdf8; font-weight:bold;">${lineData.brand} (${lineData.order})</span>
                            </div>
                            <div class="data-row">
                                <span>运作时间:</span>
                                <span>${(lineData.elapsedMins / 60).toFixed(2)} 小时</span>
                            </div>
                            <div class="data-row">
                                <span>预期产量:</span>
                                <span class="data-value">${lineData.expectedOutput}</span>
                            </div>
                            <div class="data-row">
                                <span>实际达成:</span>
                                <span class="data-value" style="color: #8b5cf6;">${lineData.actualOutput}</span>
                            </div>
                            <div class="rate-container">
                                <div class="rate-title">达标率 (最后更新: ${lineData.lastUpdate})</div>
                                <div class="rate-big-value ${rateColorClass}">${lineData.achievementRate.toFixed(1)}%</div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += cardHTML;
                });
            });
        }
    </script>
</body>
</html>
