<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌐 工厂全局实时监控看板</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #0b0f19; color: #e2e8f0; margin: 0; padding: 20px; }
        
        /* 顶部控制栏 */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; border-bottom: 2px solid #334155; padding-bottom: 15px;}
        h1 { color: #00e5ff; text-shadow: 0 0 20px rgba(0, 229, 255, 0.8); letter-spacing: 4px; font-size: 28px; margin: 0;}
        
        /* 筛选器容器 */
        .filters { display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }
        .filter-group { display: flex; align-items: center; background: rgba(30, 41, 59, 0.8); border: 1px solid #38bdf8; border-radius: 8px; padding: 5px 10px; }
        .filter-group label { color: #facc15; font-weight: bold; margin-right: 8px; font-size: 14px;}
        .filter-group input, .filter-group select { background: transparent; color: #fff; border: none; font-size: 16px; font-weight: bold; outline: none; cursor: pointer; }
        .filter-group select option { background: #0f172a; }
        
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .line-card { background: rgba(30, 41, 59, 0.8); border: 1px solid #334155; border-radius: 12px; padding: 15px 20px; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.4); transition: 0.3s; }
        .line-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.6); border-color: #38bdf8;}

        .line-header { font-size: 24px; font-weight: bold; color: #fff; border-bottom: 2px solid #334155; padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        /* 🔴🟡🟢 三色状态灯 */
        .status-dot { height: 16px; width: 16px; background-color: #10b981; border-radius: 50%; display: inline-block; box-shadow: 0 0 10px #10b981; animation: blink 1.5s infinite;}
        .status-dot.paused { background-color: #facc15; box-shadow: 0 0 10px #facc15; animation: none;} /* 黄色 */
        .status-dot.stopped { background-color: #ef4444; box-shadow: 0 0 10px #ef4444; animation: none;} /* 红色 */
        @keyframes blink { 50% { opacity: 0.4; } }

        .data-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 16px; color: #94a3b8; }
        .data-value { font-size: 26px; font-weight: bold; color: #fff; font-family: 'Courier New', Courier, monospace;}
        
        .rate-container { text-align: center; margin-top: 15px; padding-top: 10px; border-top: 1px dashed #334155; }
        .rate-title { font-size: 14px; color: #94a3b8; }
        .rate-big-value { font-size: 55px; font-weight: bold; line-height: 1.1; margin-top: 5px; font-family: 'Courier New', Courier, monospace; }

        .good { color: #10b981; text-shadow: 0 0 15px rgba(16, 185, 129, 0.6); }
        .warning { color: #facc15; text-shadow: 0 0 15px rgba(250, 204, 21, 0.6); }
        .danger { color: #ef4444; text-shadow: 0 0 15px rgba(239, 68, 68, 0.6); }

        #noDataMsg { text-align: center; font-size: 24px; color: #64748b; margin-top: 100px; display: none; }
    </style>
</head>
<body>

    <div class="top-bar">
        <h1>🌐 全局实时监控</h1>
        <div class="filters">
            <div class="filter-group">
                <label>📅 日期</label>
                <input type="date" id="viewDate">
            </div>
            <div class="filter-group">
                <label>🏭 工厂</label>
                <select id="filterFactory">
                    <option value="ALL">全部</option>
                    <option value="LY">LY</option>
                    <option value="LFY">LFY</option>
                </select>
            </div>
            <div class="filter-group">
                <label>🏭 类型</label>
                <select id="filterType">
                    <option value="ALL">全部</option>
                    <option value="成型">成型</option>
                    <option value="针车">针车</option>
                </select>
            </div>
            <div class="filter-group" style="border-color: #facc15;">
                <label>🔽 排序</label>
                <select id="sortBy">
                    <option value="line">默认 (厂区/线别)</option>
                    <option value="rate">达标率 (高至低)</option>
                    <option value="brand">品牌 (A-Z)</option>
                </select>
            </div>
        </div>
    </div>
    
    <div id="noDataMsg">📡 正在搜寻数据... </div>
    <div class="grid-container" id="cardsContainer"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDqZ1g_Rnb-qf0ij0Y53PyGJgzYoWDVeKk",
            authDomain: "factory-mes-2026.firebaseapp.com",
            databaseURL: "https://factory-mes-2026-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "factory-mes-2026",
            storageBucket: "factory-mes-2026.firebasestorage.app",
            messagingSenderId: "710873291817",
            appId: "1:710873291817:web:92ea2aadc4dd895fb19038"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let datePicker = document.getElementById('viewDate');
        let currentListenerRef = null;
        let globalData = null; // 储存当前获取到的 Firebase 数据

        // 监听筛选器变化
        document.getElementById('filterFactory').addEventListener('change', renderCards);
        document.getElementById('filterType').addEventListener('change', renderCards);
        document.getElementById('sortBy').addEventListener('change', renderCards);

        window.onload = () => {
            let today = new Date();
            datePicker.value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
            loadDataForDate(datePicker.value);
        };

        datePicker.addEventListener('change', (e) => loadDataForDate(e.target.value));

        function loadDataForDate(targetDate) {
            const container = document.getElementById('cardsContainer');
            const noDataMsg = document.getElementById('noDataMsg');
            container.innerHTML = '';
            noDataMsg.innerHTML = `📡 正在载入 ${targetDate} 的数据...`;
            noDataMsg.style.display = 'block';

            if (currentListenerRef) currentListenerRef.off();

            currentListenerRef = db.ref('production_data/' + targetDate);
            currentListenerRef.on('value', (snapshot) => {
                globalData = snapshot.val();
                renderCards();
            });
        }

        // 核心渲染逻辑 (包含筛选与排序)
        function renderCards() {
            const container = document.getElementById('cardsContainer');
            const noDataMsg = document.getElementById('noDataMsg');
            container.innerHTML = ''; 

            if (!globalData) {
                noDataMsg.innerHTML = `📭 所选日期尚未有任何产线纪录。`;
                noDataMsg.style.display = 'block';
                return;
            }
            
            // 将 Firebase 对象转为阵列
            let linesArray = Object.values(globalData);
            
            // 1. 获取筛选条件
            let fFactory = document.getElementById('filterFactory').value;
            let fType = document.getElementById('filterType').value;
            let sortBy = document.getElementById('sortBy').value;

            // 2. 执行过滤 (Filter)
            linesArray = linesArray.filter(item => {
                if (fFactory !== "ALL" && item.factory !== fFactory) return false;
                if (fType !== "ALL" && !item.line.includes(fType)) return false;
                return true;
            });

            if (linesArray.length === 0) {
                noDataMsg.innerHTML = `⚠️ 找不到符合筛选条件的产线。`;
                noDataMsg.style.display = 'block';
                return;
            }
            noDataMsg.style.display = 'none';

            // 3. 执行排序 (Sort)
            linesArray.sort((a, b) => {
                if (sortBy === "line") {
                    if (a.factory === b.factory) {
                        return a.line.localeCompare(b.line, undefined, {numeric: true, sensitivity: 'base'});
                    }
                    return a.factory.localeCompare(b.factory);
                } else if (sortBy === "rate") {
                    return b.achievementRate - a.achievementRate; // 高到低
                } else if (sortBy === "brand") {
                    return (a.brand || "").localeCompare(b.brand || "");
                }
            });

            // 4. 渲染画面
            linesArray.forEach(lineData => {
                let rateColorClass = "good";
                if (lineData.elapsedMins > 1) {
                    if (lineData.achievementRate >= 100) rateColorClass = "good";
                    else if (lineData.achievementRate >= 90) rateColorClass = "warning";
                    else rateColorClass = "danger";
                }

                // 判断红黄绿三色状态灯
                let statusDotClass = "status-dot"; // 默认绿色
                let statusTitle = "运行中";
                if (lineData.status === "PAUSED") {
                    statusDotClass = "status-dot paused";
                    statusTitle = "已暂停";
                } else if (lineData.status === "STOPPED") {
                    statusDotClass = "status-dot stopped";
                    statusTitle = "已结束";
                }

                let cardHTML = `
                    <div class="line-card">
                        <div class="line-header">
                            <span>🏭 ${lineData.factory} - ${lineData.line}</span>
                            <span class="${statusDotClass}" title="${statusTitle}"></span>
                        </div>
                        <div class="data-row">
                            <span>品牌 / 单号:</span>
                            <span style="color: #38bdf8; font-weight:bold;">${lineData.brand} (${lineData.order})</span>
                        </div>
                        <div class="data-row">
                            <span>运作时间:</span>
                            <span>${(lineData.elapsedMins / 60).toFixed(2)} 小时</span>
                        </div>
                        <div class="data-row">
                            <span>预期产量:</span>
                            <span class="data-value">${lineData.expectedOutput}</span>
                        </div>
                        <div class="data-row">
                            <span>实际达成:</span>
                            <span class="data-value" style="color: #8b5cf6;">${lineData.actualOutput}</span>
                        </div>
                        <div class="rate-container">
                            <div class="rate-title">达标率 (最后更新: ${lineData.lastUpdate})</div>
                            <div class="rate-big-value ${rateColorClass}">${lineData.achievementRate.toFixed(1)}%</div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }
    </script>
</body>
</html>
