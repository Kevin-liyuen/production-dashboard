<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌐 工厂全局实时监控看板</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #0b0f19; color: #e2e8f0; margin: 0; padding: 20px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; border-bottom: 2px solid #334155; padding-bottom: 15px;}
        h1 { color: #00e5ff; text-shadow: 0 0 20px rgba(0, 229, 255, 0.8); letter-spacing: 4px; font-size: 28px; margin: 0;}
        .filters { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .filter-group { display: flex; align-items: center; background: rgba(30, 41, 59, 0.8); border: 1px solid #38bdf8; border-radius: 8px; padding: 5px 10px; }
        .filter-group label { color: #facc15; font-weight: bold; margin-right: 8px; font-size: 14px;}
        
        .filter-group input, .filter-group select { background: transparent; color: #fff; border: none; font-size: 15px; font-weight: bold; outline: none; cursor: pointer; }
        .filter-group select option { background: #0f172a; }
        input:-webkit-autofill { -webkit-box-shadow: 0 0 0 50px #0f172a inset !important; -webkit-text-fill-color: #fff !important; transition: background-color 5000s ease-in-out 0s; }

        .view-filter { border-color: #f472b6 !important; background: rgba(244, 114, 182, 0.1) !important; }
        .btn-scroll { background: #3b82f6; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; }
        .line-card { background: rgba(30, 41, 59, 0.8); border: 1px solid #334155; border-radius: 12px; padding: 15px 20px; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.4); display: flex; flex-direction: column; cursor: pointer;}
        .line-header { font-size: 24px; font-weight: bold; color: #fff; border-bottom: 2px solid #334155; padding-bottom: 10px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        
        .list-container { display: flex; flex-direction: column; gap: 10px; }
        .list-row { display: flex; justify-content: space-between; align-items: center; background: rgba(30, 41, 59, 0.7); border: 1px solid #334155; padding: 12px 20px; border-radius: 8px; flex-wrap: wrap; cursor: pointer;}
        .list-col { flex: 1; text-align: center; min-width: 100px; pointer-events: none;} 
        .list-col.left { text-align: left; flex: 1.5; min-width: 180px; }
        .list-col.right { text-align: right; flex: 0.8; }
        .list-title { font-size: 12px; color: #94a3b8; margin-bottom: 4px; text-transform: uppercase; }
        .list-val { font-size: 22px; font-weight: bold; color: #fff; font-family: 'Courier New', Courier, monospace;}

        /* 🚀 移除离线灯与暂停灯 */
        .status-dot { height: 16px; width: 16px; background-color: #10b981; border-radius: 50%; display: inline-block; box-shadow: 0 0 10px #10b981;}
        .status-dot.stopped { background-color: #ef4444; box-shadow: 0 0 10px #ef4444;} 
        .status-dot.standby { background-color: #f8fafc; box-shadow: 0 0 10px #f8fafc;} 

        .data-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 15px; color: #94a3b8; pointer-events: none;}
        .data-value { font-size: 24px; font-weight: bold; color: #fff; font-family: 'Courier New', Courier, monospace;}
        .rate-container { text-align: center; margin-top: auto; padding-top: 10px; border-top: 1px dashed #334155; pointer-events: none;}
        .rate-title { font-size: 13px; color: #94a3b8; }
        .rate-big-value { font-size: 50px; font-weight: bold; line-height: 1.1; margin-top: 5px; font-family: 'Courier New', Courier, monospace; }
        
        .good { color: #10b981; text-shadow: 0 0 15px rgba(16, 185, 129, 0.6); }
        .warning { color: #facc15; text-shadow: 0 0 15px rgba(250, 204, 21, 0.6); }
        .danger { color: #ef4444; text-shadow: 0 0 15px rgba(239, 68, 68, 0.6); }
        .standby-text { color: #94a3b8; font-size: 24px; margin-top: 15px; text-align: center;}
        #noDataMsg { text-align: center; font-size: 24px; color: #64748b; margin-top: 100px; display: none; }

        #authOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b0f19; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .auth-box { background: rgba(30, 41, 59, 0.9); border: 2px solid #00e5ff; padding: 40px; border-radius: 15px; text-align: center; box-shadow: 0 0 30px rgba(0, 229, 255, 0.3);}
        .auth-box input { background: #0f172a; color: #fff; border: 1px solid #00e5ff; font-size: 20px; text-align: center; padding: 10px; margin: 15px 0; border-radius: 6px; width: 220px; }
        .auth-box button { background: #00e5ff; color: #0b0f19; border: none; font-size: 20px; padding: 10px 40px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%;}

        #fsOverlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #0b0f19; z-index: 10000; display: none; flex-direction: column; padding: 3vh 3vw; box-sizing: border-box; overflow-y: auto;} 
        .fs-close { position: absolute; top: 3vh; right: 3vw; font-size: 5vh; color: #64748b; cursor: pointer; z-index: 10001; }
        .fs-header { display: flex; justify-content: space-between; align-items: center; font-size: 7vh; font-weight: bold; color: #fff; border-bottom: 0.5vh solid #334155; padding-bottom: 2vh; margin-bottom: 2vh; }
        .fs-subheader { font-size: 3.5vh; color: #38bdf8; text-align: center; margin-bottom: 3vh; font-weight: bold; letter-spacing: 2px;}
        .fs-body { display: flex; flex: 1; gap: 3vw; }
        .fs-panel { flex: 1; background: rgba(30, 41, 59, 0.6); border: 0.4vh solid #334155; border-radius: 3vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 2vw;}
        .fs-label { font-size: 4vh; color: #94a3b8; margin-bottom: 1.5vh; text-transform: uppercase; letter-spacing: 2px;}
        .fs-val-mid { font-size: 7vh; color: #e2e8f0; font-weight: bold; font-family: 'Courier New', monospace; margin-bottom: 4vh; }
        .fs-val-huge { font-size: 20vh; font-weight: bold; font-family: 'Courier New', monospace; line-height: 1; margin-top: 2vh;} 
        .fs-footer { text-align: center; color: #64748b; font-size: 2.5vh; margin-top: 3vh; letter-spacing: 1px;}
        .fs-status-dot { height: 6vh; width: 6vh; border-radius: 50%; display: inline-block; box-shadow: 0 0 2vh currentColor; margin-left: 2vw;}

        @media (max-width: 900px) {
            #fsOverlay { padding: 8vh 5vw; }
            .fs-header { font-size: 4vh; margin-bottom: 1vh; flex-wrap: wrap;}
            .fs-close { font-size: 4vh; top: 2vh; right: 4vw; }
            .fs-subheader { font-size: 2vh; margin-bottom: 2vh; }
            .fs-body { flex-direction: column; gap: 2vh; }
            .fs-panel { padding: 4vh 2vw; border-radius: 2vh; }
            .fs-label { font-size: 2.5vh; }
            .fs-val-mid { font-size: 6vh; margin-bottom: 2vh; }
            .fs-val-huge { font-size: 12vh; margin-top: 1vh;}
            .fs-footer { font-size: 2vh; margin-bottom: 5vh;} 
        }
    </style>
</head>
<body>
    <div id="authOverlay">
        <div class="auth-box">
            <h2 style="color: #00e5ff; margin-top:0;">📊 全局看板授权</h2>
            <input type="password" id="pinInput" placeholder="请输入密码">
            <br><button onclick="verifyBoss()">开启看板</button>
            <p id="pinError" style="color: #ef4444; display: none; margin-top: 15px; font-weight: bold;">❌ 密码错误</p>
        </div>
    </div>

    <div id="mainContent" style="display: none;">
        <div class="top-bar">
            <h1>🌐 全局打卡快照看板</h1>
            <div class="filters">
                <div class="filter-group"><input type="date" id="viewDate"></div>
                <div class="filter-group"><select id="filterFactory"><option value="ALL">全厂</option><option value="LY">LY</option><option value="LFY">LFY</option></select></div>
                <div class="filter-group"><select id="filterType"><option value="ALL">全类型</option><option value="成型">成型</option><option value="针车">针车</option><option value="组底">组底</option></select></div>
                <div class="filter-group" style="border-color: #facc15;"><label>🔽</label><select id="sortBy"><option value="line">默认排序</option><option value="rate">达标率优先</option><option value="defect">不良率优先</option></select></div>
                <div class="filter-group view-filter"><label style="color: #f472b6;">👁️ 视角</label>
                    <select id="viewMode" style="color: #f472b6;">
                        <option value="ALL">综合看板 (快照)</option>
                        <option value="QTY">产量看板 (隐藏不良)</option>
                        <option value="QUAL">质量看板 (专注不良)</option>
                        <option value="SIMPLE">📝 简易列表 (快照)</option>
                    </select>
                </div>
                <button id="btnAutoScroll" class="btn-scroll" onclick="toggleAutoScroll()">🔄</button>
            </div>
        </div>
        <div id="noDataMsg">📡 正在搜寻数据... </div>
        <div class="grid-container" id="cardsContainer"></div>
    </div>

    <div id="fsOverlay">
        <div class="fs-close" onclick="closeFullscreen()">✖</div>
        <div class="fs-header"><span id="fs-title">载入中...</span><span id="fs-status" class="fs-status-dot status-dot"></span></div>
        <div class="fs-subheader" id="fs-subtitle">--</div>
        <div class="fs-body">
            <div class="fs-panel" style="border-color: #38bdf8;">
                <div class="fs-label">打卡时实际 / 预期</div>
                <div class="fs-val-mid"><span id="fs-actual" style="color: #8b5cf6;">0</span> <span style="color: #94a3b8;">/</span> <span id="fs-expected">0</span></div>
                <div class="fs-label">打 卡 时 达 标 率</div>
                <div id="fs-rate" class="fs-val-huge good">0.0%</div>
            </div>
            <div class="fs-panel" style="border-color: #f472b6;">
                <div class="fs-label">打卡时不良数</div>
                <div class="fs-val-mid" id="fs-defect-count" style="color: #ef4444;">0</div>
                <div class="fs-label">打 卡 时 不 良 率</div>
                <div id="fs-defect-rate" class="fs-val-huge good">0.0%</div>
            </div>
        </div>
        <div class="fs-footer" id="fs-footer">距上次打卡: -- 分钟</div>
    </div>

    <script>
        function hashPIN(str) { let hash = 0; for (let i = 0; i < str.length; i++) { hash = (hash << 5) - hash + str.charCodeAt(i); hash |= 0; } return hash.toString(); }
        const BOSS_HASH = "1690049"; 
        function verifyBoss() {
            if (hashPIN(document.getElementById('pinInput').value) === BOSS_HASH) {
                document.getElementById('authOverlay').style.display = 'none'; document.getElementById('mainContent').style.display = 'block'; initBoard(); 
            } else { document.getElementById('pinError').style.display = 'block'; document.getElementById('pinInput').value = ''; }
        }
        document.getElementById('pinInput').addEventListener("keypress", (e) => { if (e.key === "Enter") verifyBoss(); });

        const firebaseConfig = { apiKey: "AIzaSyDqZ1g_Rnb-qf0ij0Y53PyGJgzYoWDVeKk", authDomain: "factory-mes-2026.firebaseapp.com", databaseURL: "https://factory-mes-2026-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "factory-mes-2026" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();

        let currentListenerRef = null; let globalData = null; let activeFSKey = null; 

        function initBoard() {
            setInterval(() => { renderCards(); updateFullscreenView(); }, 5000); 
            let formatter = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Phnom_Penh', year: 'numeric', month: '2-digit', day: '2-digit' });
            document.getElementById('viewDate').value = formatter.format(new Date()); loadDataForDate(document.getElementById('viewDate').value);
        }

        let scrollInterval = null; let isAutoScrolling = false;
        function toggleAutoScroll() {
            isAutoScrolling = !isAutoScrolling; let btn = document.getElementById('btnAutoScroll');
            if (isAutoScrolling) {
                btn.innerHTML = "⏸️"; btn.style.background = "#f59e0b"; 
                scrollInterval = setInterval(() => { if(document.getElementById('fsOverlay').style.display === 'flex') return; window.scrollBy(0, 1); if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 2) window.scrollTo(0, 0); }, 30);
            } else { btn.innerHTML = "🔄"; btn.style.background = "#3b82f6"; clearInterval(scrollInterval); }
        }

        document.getElementById('filterFactory').addEventListener('change', renderCards); document.getElementById('filterType').addEventListener('change', renderCards);
        document.getElementById('sortBy').addEventListener('change', renderCards); document.getElementById('viewMode').addEventListener('change', renderCards); 
        document.getElementById('viewDate').addEventListener('change', (e) => loadDataForDate(e.target.value));
        document.addEventListener('keydown', (e) => { if (e.key === "Escape") closeFullscreen(); });

        function loadDataForDate(targetDate) {
            if (currentListenerRef) currentListenerRef.off();
            currentListenerRef = db.ref('production_data/' + targetDate);
            currentListenerRef.on('value', (snapshot) => { globalData = snapshot.val(); renderCards(); updateFullscreenView(); });
        }

        function openFullscreen(key) { activeFSKey = key; document.getElementById('fsOverlay').style.display = 'flex'; updateFullscreenView(); }
        function closeFullscreen() { activeFSKey = null; document.getElementById('fsOverlay').style.display = 'none'; }

        function updateFullscreenView() {
            if (!activeFSKey || !globalData || !globalData[activeFSKey]) { closeFullscreen(); return; }
            let data = globalData[activeFSKey];
            
            // 🚀 移除离线与暂停状态
            let statusDot = document.getElementById('fs-status'); let statusText = "🟢 运行中"; statusDot.className = "fs-status-dot status-dot";
            if (data.status === "STOPPED") { statusDot.className = "fs-status-dot status-dot stopped"; statusText = "🔴 已结束"; } 
            else if (data.status === "STANDBY") { statusDot.className = "fs-status-dot status-dot standby"; statusText = "⚪ 待命"; } 

            document.getElementById('fs-title').innerText = `🏭 ${data.factory} - ${data.line}`;
            document.getElementById('fs-subtitle').innerText = `品牌: ${data.brand} | 单号: ${data.order} | 状态: ${statusText}`;
            
            let expected = data.lastReportExpected || data.expectedOutput || 0;
            let rate = data.lastReportRate || data.achievementRate || 0;
            
            document.getElementById('fs-actual').innerText = data.actualOutput || 0;
            document.getElementById('fs-expected').innerText = expected;
            
            let rateColorClass = "good"; if (data.elapsedMins > 1) { if (rate >= 100) rateColorClass = "good"; else if (rate >= 90) rateColorClass = "warning"; else rateColorClass = "danger"; }
            let rateEl = document.getElementById('fs-rate'); rateEl.innerText = rate.toFixed(1) + '%'; rateEl.className = `fs-val-huge ${rateColorClass}`;

            let defectCount = data.defectOutput || 0; let defectRate = 0;
            if (data.actualOutput > 0) defectRate = (defectCount / data.actualOutput) * 100;
            let defectColorClass = "good"; if (defectRate >= 8) defectColorClass = "danger"; else if (defectRate >= 6) defectColorClass = "warning"; 

            document.getElementById('fs-defect-count').innerText = defectCount;
            let dRateEl = document.getElementById('fs-defect-rate'); dRateEl.innerText = defectRate.toFixed(1) + '%'; dRateEl.className = `fs-val-huge ${defectColorClass}`;

            let delayMins = Math.floor((Date.now() - (data.lastReportMs || Date.now())) / 60000);
            let delayText = delayMins > 60 && data.status === "RUNNING" ? `🕒 距上次打卡: 超过 ${delayMins} 分钟 (延误!)` : `🕒 距上次打卡: ${delayMins} 分钟`;
            document.getElementById('fs-footer').innerText = `⏱️ 已运行: ${(data.elapsedMins / 60).toFixed(2)} 小时 | ${delayText}`;
            document.getElementById('fs-footer').style.color = delayMins > 60 && data.status === "RUNNING" ? "#ef4444" : "#64748b";
        }

        function renderCards() {
            const container = document.getElementById('cardsContainer'); const noDataMsg = document.getElementById('noDataMsg');
            if (!globalData) { container.innerHTML = ''; noDataMsg.style.display = 'block'; return; }
            
            let linesArray = Object.keys(globalData).map(key => { let obj = globalData[key]; obj.firebaseKey = key; return obj; });
            let fFactory = document.getElementById('filterFactory').value; let fType = document.getElementById('filterType').value;
            let sortBy = document.getElementById('sortBy').value; let viewMode = document.getElementById('viewMode').value;

            container.className = viewMode === "SIMPLE" ? "list-container" : "grid-container";
            linesArray = linesArray.filter(item => { if (fFactory !== "ALL" && item.factory !== fFactory) return false; if (fType !== "ALL" && !item.line.includes(fType)) return false; return true; });
            if (linesArray.length === 0) { container.innerHTML = ''; noDataMsg.style.display = 'block'; return; }
            noDataMsg.style.display = 'none';

            linesArray.sort((a, b) => {
                let rateA = a.lastReportRate || a.achievementRate || 0; let rateB = b.lastReportRate || b.achievementRate || 0;
                if (sortBy === "rate") return rateB - rateA;
                if (sortBy === "defect") {
                    let dRateA = (a.actualOutput > 0) ? (a.defectOutput || 0) / a.actualOutput : 0;
                    let dRateB = (b.actualOutput > 0) ? (b.defectOutput || 0) / b.actualOutput : 0;
                    return dRateB - dRateA; 
                }
                if (a.factory === b.factory) return a.line.localeCompare(b.line, undefined, {numeric: true});
                return a.factory.localeCompare(b.factory);
            });

            let newContainerHTML = ""; 
            linesArray.forEach(lineData => {
                let expected = lineData.lastReportExpected || lineData.expectedOutput || 0;
                let rate = lineData.lastReportRate || lineData.achievementRate || 0;
                let rateColorClass = "good";
                if (lineData.elapsedMins > 1) { if (rate >= 100) rateColorClass = "good"; else if (rate >= 90) rateColorClass = "warning"; else rateColorClass = "danger"; }

                // 🚀 移除离线与暂停状态
                let statusDotClass = "status-dot"; let statusTitle = "运行中";
                if (lineData.status === "STOPPED") { statusDotClass = "status-dot stopped"; statusTitle = "已结束"; } 
                else if (lineData.status === "STANDBY") { statusDotClass = "status-dot standby"; statusTitle = "待命"; }

                let defectCount = lineData.defectOutput || 0; let defectRate = 0;
                if (lineData.actualOutput > 0) defectRate = (defectCount / lineData.actualOutput) * 100;
                let defectColorClass = "good"; if (defectRate >= 8) defectColorClass = "danger"; else if (defectRate >= 6) defectColorClass = "warning"; 

                let delayMins = Math.floor((Date.now() - (lineData.lastReportMs || Date.now())) / 60000);
                let delayHint = delayMins > 60 && lineData.status === "RUNNING" ? `<span style="color:#ef4444; font-weight:bold;">🕒 距打卡: ${delayMins}分钟 (延误)</span>` : `🕒 距打卡: ${delayMins}分钟`;

                let onClickAttr = `onclick="openFullscreen('${lineData.firebaseKey}')"`;

                if (viewMode === "SIMPLE") {
                    let leftBorderColor = lineData.status === "STANDBY" ? "#94a3b8" : (rateColorClass === 'good' ? '#10b981' : (rateColorClass === 'warning' ? '#facc15' : '#ef4444'));
                    let rowContent = lineData.status === "STANDBY" ? `<div class="list-col" style="flex: 4; text-align: center; color: #94a3b8;">⚪ 等待产线开工...</div>` : `
                            <div class="list-col"><div class="list-title">已运行</div><div class="list-val">${(lineData.elapsedMins / 60).toFixed(2)}h</div></div>
                            <div class="list-col"><div class="list-title">该刻实际 / 预期</div><div class="list-val"><span style="color:#8b5cf6;">${lineData.actualOutput || 0}</span> <span style="color:#94a3b8;">/</span> ${expected}</div></div>
                            <div class="list-col"><div class="list-title">打卡达标率</div><div class="list-val ${rateColorClass}">${rate.toFixed(1)}%</div></div>
                            <div class="list-col"><div class="list-title">不良数 (率)</div><div class="list-val ${defectColorClass}">${defectCount} <span style="font-size:14px;">(${defectRate.toFixed(1)}%)</span></div></div>
                        `;
                    newContainerHTML += `<div class="list-row" style="border-left: 5px solid ${leftBorderColor};" ${onClickAttr} title="点击放大显示此线">
                            <div class="list-col left"><div style="font-size: 20px; font-weight: bold; color: #fff;">🏭 ${lineData.factory} - ${lineData.line}</div><div style="font-size: 14px; color: #38bdf8; margin-top:3px;">${lineData.brand} <small>(${lineData.order})</small></div></div>
                            ${rowContent}
                            <div class="list-col right"><div class="list-title">状态</div><div style="font-size: 15px; color: #cbd5e1; font-weight:bold;"><span class="${statusDotClass}" style="vertical-align: text-top; margin-right:4px;"></span>${statusTitle}</div><div style="font-size: 11px; color: #64748b; margin-top:5px;">${delayHint}</div></div>
                        </div>`;
                    return; 
                }

                let qtyBlock = `<div class="data-row"><span>已运行时间:</span><span>${(lineData.elapsedMins / 60).toFixed(2)} 小时</span></div><div class="data-row"><span>打卡时实际/预期:</span><span class="data-value" style="font-size: 20px;"><span style="color: #8b5cf6;">${lineData.actualOutput || 0}</span> <span style="color:#94a3b8;">/</span> ${expected}</span></div><div class="rate-container"><div class="rate-title">打卡达标率</div><div class="rate-big-value ${rateColorClass}">${rate.toFixed(1)}%</div></div><div style="font-size: 12px; color: #94a3b8; text-align: right; margin-top: 10px; border-top: 1px solid #334155; padding-top:5px;">${delayHint}</div>`;
                let qualBlock = `<div class="data-row"><span>已运行时间:</span><span>${(lineData.elapsedMins / 60).toFixed(2)} 小时</span></div><div class="data-row"><span>打卡时实际产量:</span><span class="data-value" style="color: #8b5cf6;">${lineData.actualOutput || 0}</span></div><div class="rate-container" style="border-top: 1px dashed #334155; margin-top: 15px; padding-top: 15px;"><div class="rate-title">打卡时不良数 / 不良率</div><div style="margin-top: 10px;"><span class="${defectColorClass}" style="font-size: 50px; font-family: 'Courier New', Courier, monospace; font-weight: bold;">${defectCount}</span><span class="${defectColorClass}" style="font-size: 70px; margin-left:10px; font-family: 'Courier New', Courier, monospace; font-weight: bold;">(${defectRate.toFixed(1)}%)</span></div></div><div style="font-size: 12px; color: #94a3b8; text-align: right; margin-top: 10px; border-top: 1px solid #334155; padding-top:5px;">${delayHint}</div>`;
                let allBlock = `<div class="data-row"><span>已运行时间:</span><span>${(lineData.elapsedMins / 60).toFixed(2)} 小时</span></div><div class="data-row"><span>打卡时实际/预期:</span><span class="data-value" style="font-size: 20px;"><span style="color: #8b5cf6;">${lineData.actualOutput || 0}</span> <span style="color:#94a3b8;">/</span> ${expected}</span></div><div style="display: flex; justify-content: space-between; margin-top: auto; border-top: 1px dashed #334155; padding-top: 10px;"><div style="width: 48%; text-align: center;"><div class="rate-title">打卡达标率</div><div class="rate-big-value ${rateColorClass}" style="font-size: 40px;">${rate.toFixed(1)}%</div></div><div style="width: 48%; text-align: center; border-left: 1px dashed #334155;"><div class="rate-title">不良数 / 率</div><div style="line-height: 1.1; margin-top: 5px;"><span class="${defectColorClass}" style="font-size: 28px; font-family: 'Courier New', monospace; font-weight: bold;">${defectCount}</span><br><span class="${defectColorClass}" style="font-size: 38px; font-family: 'Courier New', monospace; font-weight: bold;">${defectRate.toFixed(1)}%</span></div></div></div><div style="font-size: 12px; color: #94a3b8; text-align: right; margin-top: 10px; border-top: 1px solid #334155; padding-top:5px;">${delayHint}</div>`;

                let contentHTML = lineData.status === "STANDBY" ? `<div class="rate-container"><div class="standby-text">⚪ 等待产线开工</div></div>` : (viewMode === "QTY" ? qtyBlock : (viewMode === "QUAL" ? qualBlock : allBlock));

                newContainerHTML += `<div class="line-card" ${onClickAttr} title="点击放大显示此线"><div class="line-header"><span>🏭 ${lineData.factory} - ${lineData.line}</span><span class="${statusDotClass}" title="${statusTitle}"></span></div><div class="data-row"><span>品牌 / 单号:</span><span style="color: #38bdf8; font-weight:bold;">${lineData.brand} <small>(${lineData.order})</small></span></div>${contentHTML}</div>`;
            });
            container.innerHTML = newContainerHTML;
        }
    </script>
</body>
</html>
