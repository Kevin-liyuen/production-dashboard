<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚙️ 管理者后台 - 终极试算表模式</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #0b0f19; color: #e2e8f0; margin: 0; padding: 20px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #334155; padding-bottom: 15px;}
        h1 { color: #f472b6; text-shadow: 0 0 15px rgba(244, 114, 182, 0.6); letter-spacing: 2px; font-size: 28px; margin: 0;}
        .control-panel { display: flex; gap: 15px; align-items: center; background: rgba(30, 41, 59, 0.8); padding: 10px 20px; border-radius: 10px; border: 1px solid #334155;}
        .control-panel label { font-size: 16px; font-weight: bold; color: #38bdf8; }
        .control-panel input[type="date"] { background-color: #0f172a; color: #fff; border: 2px solid #38bdf8; padding: 8px 15px; border-radius: 6px; font-size: 16px; font-weight: bold; outline: none; }
        button { cursor: pointer; font-weight: bold; color: #fff; border: none; border-radius: 6px; transition: 0.3s; padding: 10px 20px; font-size: 16px;}
        .btn-refresh { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .btn-add { background: linear-gradient(135deg, #8b5cf6, #6d28d9); }
        .btn-save-all { background: linear-gradient(135deg, #10b981, #059669); font-size: 18px; box-shadow: 0 0 15px rgba(16, 185, 129, 0.5); border: 2px solid #34d399;}
        .btn-save-all:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(16, 185, 129, 0.8); }
        
        .table-container { overflow-x: auto; background: rgba(30, 41, 59, 0.6); border-radius: 10px; border: 1px solid #334155; padding: 10px; margin-bottom: 30px;}
        table { width: 100%; border-collapse: collapse; text-align: center; white-space: nowrap;}
        th { background-color: #1e293b; color: #94a3b8; padding: 12px 8px; border-bottom: 2px solid #f472b6; font-size: 15px;}
        td { padding: 8px; border-bottom: 1px solid #334155; vertical-align: middle;}
        tr:hover { background-color: rgba(244, 114, 182, 0.05); }

        .grid-input, .grid-select { width: 100%; background-color: #0f172a; color: #fff; border: 1px solid #64748b; padding: 6px; border-radius: 4px; font-size: 15px; font-weight: bold; outline: none; text-align: center;}
        .grid-input:focus, .grid-select:focus { border-color: #f472b6; box-shadow: 0 0 8px rgba(244, 114, 182, 0.6); color: #f472b6;}
        .col-sm { width: 80px; } .col-md { width: 120px; } .col-lg { width: 150px; }
        .btn-delete { background: #ef4444; padding: 6px 12px; font-size: 14px; }

        #authOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #0b0f19; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .auth-box { background: rgba(30, 41, 59, 0.9); border: 2px solid #f472b6; padding: 40px; border-radius: 15px; text-align: center; box-shadow: 0 0 30px rgba(244, 114, 182, 0.3);}
        .auth-box h2 { color: #f472b6; margin-top: 0; }
        .auth-box input { font-size: 30px; letter-spacing: 10px; width: 200px; text-align: center; margin: 20px 0; background: #0f172a; color: #fff; border: 2px solid #f472b6; border-radius: 8px;}
        .auth-box button { font-size: 20px; padding: 10px 40px; width: 100%; background: #f472b6;}

        #noDataMsg { text-align: center; font-size: 20px; color: #64748b; margin-top: 50px; }
        .warning-text { background: rgba(239, 68, 68, 0.1); border-left: 4px solid #ef4444; padding: 10px; margin-bottom: 20px; color: #cbd5e1; font-size: 14px;}
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="auth-box">
            <h2>⚙️ 后台超级管理</h2>
            <p style="color: #94a3b8;">请输入管理者密码</p>
            <input type="password" id="adminPin" placeholder="******">
            <br>
            <button onclick="verifyAdmin()">进入系统</button>
            <p id="pinError" style="color: #ef4444; display: none; margin-top: 15px; font-weight: bold;">❌ 密码错误</p>
        </div>
    </div>

    <div class="top-bar">
        <h1>⚙️ 全局数据修正 (Excel 模式)</h1>
        <div class="control-panel">
            <label>柬埔寨日期：</label>
            <input type="date" id="adminDate">
            <button class="btn-refresh" onclick="loadData()">🔄 读取云端数据</button>
        </div>
        <button class="btn-save-all" onclick="saveAllData()">💾 1次性保存整个页面</button>
    </div>
    
    <div class="warning-text">
        ⚠️ <b>注意：</b> 如果车间前线仍在「🟢 运行中」，每秒都会上存数据覆盖你的修改。<b>大改前请确认产线已暂停或结束！</b><br>
        💡 预期产量和达标率会在点击「保存」时，系统自动按 POH、人数、运作时间重新计算。
    </div>

    <div class="table-container">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>工厂</th>
                    <th>线别</th>
                    <th>品牌</th>
                    <th>单号</th>
                    <th>开工时间</th>
                    <th style="color:#facc15;">运作(分钟)</th>
                    <th>本日100% POH</th>
                    <th>生产/配备员工+班组课</th>
                    <th style="color:#8b5cf6; font-size: 18px;">实际产量</th>
                    <th style="color:#ef4444; font-size: 18px;">不良数</th>
                    <th>生产状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
        <div style="margin-top: 15px; text-align: left;">
            <button class="btn-add" onclick="addNewRow()">➕ 往下新增空白行</button>
        </div>
        <div id="noDataMsg">👈 请先点击「读取云端数据」</div>
    </div>

    <script>
        function hashPIN(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) { hash = (hash << 5) - hash + str.charCodeAt(i); hash |= 0; }
            return hash.toString();
        }
        
        const ADMIN_HASH = "1754688"; // 正确的 9999 Hash

        function verifyAdmin() {
            let input = document.getElementById('adminPin').value;
            if (hashPIN(input) === ADMIN_HASH) {
                document.getElementById('authOverlay').style.display = 'none';
            } else {
                document.getElementById('pinError').style.display = 'block';
                document.getElementById('adminPin').value = '';
            }
        }
        document.getElementById('adminPin').addEventListener("keypress", (e) => { if (e.key === "Enter") verifyAdmin(); });

        const firebaseConfig = {
            apiKey: "AIzaSyDqZ1g_Rnb-qf0ij0Y53PyGJgzYoWDVeKk",
            authDomain: "factory-mes-2026.firebaseapp.com",
            databaseURL: "https://factory-mes-2026-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "factory-mes-2026",
            storageBucket: "factory-mes-2026.firebasestorage.app",
            messagingSenderId: "710873291817",
            appId: "1:710873291817:web:92ea2aadc4dd895fb19038"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const factoryOptions = `<option value="LY">LY</option><option value="LFY">LFY</option>`;
        const statusOptions = `
            <option value="STANDBY">⚪ 待命 (未开工)</option>
            <option value="RUNNING">🟢 运行中</option>
            <option value="PAUSED">🟡 已暂停</option>
            <option value="STOPPED">🔴 已结束</option>
            <option value="OFFLINE">⚫ 离线</option>
        `;
        const lineOptions = `
            <optgroup label="成型"><option value="成型A">成型A</option><option value="成型B">成型B</option><option value="成型C">成型C</option><option value="成型D">成型D</option><option value="成型E">成型E</option><option value="成型F">成型F</option></optgroup>
            <optgroup label="针车"><option value="针车1">针车1</option><option value="针车2">针车2</option><option value="针车3">针车3</option><option value="针车4">针车4</option><option value="针车5">针车5</option><option value="针车6">针车6</option></optgroup>
        `;

        function getCambodiaDateString() {
            let formatter = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Phnom_Penh', year: 'numeric', month: '2-digit', day: '2-digit' });
            return formatter.format(new Date());
        }

        window.onload = () => { document.getElementById('adminDate').value = getCambodiaDateString(); };

        function loadData() {
            let targetDate = document.getElementById('adminDate').value;
            const tbody = document.getElementById('tableBody');
            const noDataMsg = document.getElementById('noDataMsg');
            tbody.innerHTML = ''; noDataMsg.style.display = 'block'; noDataMsg.innerHTML = "⏳ 正在读取数据...";

            db.ref('production_data/' + targetDate).once('value').then((snapshot) => {
                noDataMsg.style.display = 'none';
                if (!snapshot.exists()) { noDataMsg.style.display = 'block'; noDataMsg.innerHTML = "📭 此日期没有数据，可新增空白行建立。"; return; }
                
                let data = snapshot.val();
                let linesArray = Object.keys(data).map(key => data[key]);
                linesArray.sort((a, b) => {
                    if(a.factory === b.factory) return a.line.localeCompare(b.line, undefined, {numeric: true});
                    return a.factory.localeCompare(b.factory);
                });
                linesArray.forEach(line => appendRow(line));
            }).catch(err => { noDataMsg.innerHTML = "❌ 读取失败：" + err.message; });
        }

        function appendRow(d = {}) {
            const tbody = document.getElementById('tableBody');
            let tr = document.createElement('tr');
            let f = d.factory || 'LY'; let l = d.line || '成型A'; let s = d.status || 'STOPPED';

            let fHTML = factoryOptions.replace(`value="${f}"`, `value="${f}" selected`);
            let lHTML = lineOptions.replace(`value="${l}"`, `value="${l}" selected`);
            let sHTML = statusOptions.replace(`value="${s}"`, `value="${s}" selected`);

            tr.innerHTML = `
                <td class="col-sm"><select class="grid-select f-factory">${fHTML}</select></td>
                <td class="col-md"><select class="grid-select f-line">${lHTML}</select></td>
                <td class="col-md"><input type="text" class="grid-input f-brand" value="${d.brand || ''}"></td>
                <td class="col-md"><input type="text" class="grid-input f-order" value="${d.order || ''}"></td>
                <td class="col-sm"><input type="time" class="grid-input f-start" value="${d.startTime || '08:00'}"></td>
                <td class="col-sm"><input type="number" step="0.1" class="grid-input f-elapsed" value="${d.elapsedMins || 0}"></td>
                <td class="col-sm"><input type="number" step="0.01" class="grid-input f-poh" value="${d.poh || 1}"></td>
                <td class="col-sm"><input type="number" class="grid-input f-workers" value="${d.workers || 10}"></td>
                <td class="col-sm"><input type="number" class="grid-input f-actual" style="color:#f472b6;" value="${d.actualOutput || 0}"></td>
                <td class="col-sm"><input type="number" class="grid-input f-defect" style="color:#ef4444;" value="${d.defectOutput || 0}"></td>
                <td class="col-md"><select class="grid-select f-status">${sHTML}</select></td>
                <td><button class="btn-delete" onclick="this.closest('tr').remove()">🗑️ 删</button></td>
            `;
            tbody.appendChild(tr);
        }

        function addNewRow() { document.getElementById('noDataMsg').style.display = 'none'; appendRow(); }

        function saveAllData() {
            let targetDate = document.getElementById('adminDate').value;
            let rows = document.querySelectorAll('#tableBody tr');
            
            if (!targetDate) { alert("日期不正确！"); return; }
            if (confirm(`⚠️ 确定要保存吗？\n将会把画面上的数据【覆盖】云端 ${targetDate} 的记录。`)) {
                let updatePayload = {}; let errorFound = false;

                rows.forEach(tr => {
                    let factory = tr.querySelector('.f-factory').value;
                    let line = tr.querySelector('.f-line').value;
                    let key = `${factory}_${line}`; 

                    if (updatePayload[key]) {
                        alert(`❌ 错误：发现重复！\n【${factory} - ${line}】存在多行，请删除重复行。`);
                        errorFound = true; return;
                    }

                    let elapsedMins = parseFloat(tr.querySelector('.f-elapsed').value) || 0;
                    let poh = parseFloat(tr.querySelector('.f-poh').value) || 0;
                    let workers = parseInt(tr.querySelector('.f-workers').value) || 0;
                    let actualOutput = parseInt(tr.querySelector('.f-actual').value) || 0;
                    let defectOutput = parseInt(tr.querySelector('.f-defect').value) || 0; // 抓取不良数
                    let status = tr.querySelector('.f-status').value;

                    let expectedOutput = 0; let achievementRate = 0;
                    if (status !== "STANDBY") {
                        expectedOutput = Math.floor((poh * workers / 60) * elapsedMins);
                        if (expectedOutput > 0) achievementRate = (actualOutput / expectedOutput) * 100;
                    }

                    updatePayload[key] = {
                        factory: factory, line: line,
                        brand: tr.querySelector('.f-brand').value || '', order: tr.querySelector('.f-order').value || '',
                        startTime: tr.querySelector('.f-start').value, elapsedMins: elapsedMins,
                        poh: poh, workers: workers,
                        actualOutput: actualOutput, defectOutput: defectOutput, expectedOutput: expectedOutput,
                        achievementRate: achievementRate, status: status,
                        lastUpdateMs: Date.now(), // 更新心跳时间，防止 Boss 端误判离线
                        lastUpdate: new Date().toLocaleTimeString('zh-CN', { timeZone: 'Asia/Phnom_Penh' }) + " (后台大修)"
                    };
                });

                if (errorFound) return; 

                db.ref('production_data/' + targetDate).set(updatePayload).then(() => {
                    alert('✅ 页面数据已全部保存至云端！'); loadData(); 
                }).catch(err => { alert('❌ 保存失败：' + err.message); });
            }
        }
    </script>
</body>
</html>
