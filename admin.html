<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚙️ 管理者后台 - 数据修正与管理</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #0b0f19; color: #e2e8f0; margin: 0; padding: 20px; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #334155; padding-bottom: 15px;}
        h1 { color: #f472b6; text-shadow: 0 0 15px rgba(244, 114, 182, 0.6); letter-spacing: 2px; font-size: 28px; margin: 0;}
        
        .control-panel { display: flex; gap: 15px; align-items: center; background: rgba(30, 41, 59, 0.8); padding: 10px 20px; border-radius: 10px; border: 1px solid #334155;}
        .control-panel label { font-size: 16px; font-weight: bold; color: #38bdf8; }
        .control-panel input[type="date"] { background-color: #0f172a; color: #fff; border: 2px solid #38bdf8; padding: 8px 15px; border-radius: 6px; font-size: 16px; font-weight: bold; outline: none; }
        
        button { cursor: pointer; font-weight: bold; color: #fff; border: none; border-radius: 6px; transition: 0.3s; }
        .btn-refresh { background: linear-gradient(135deg, #3b82f6, #2563eb); padding: 10px 20px; font-size: 16px; }
        .btn-refresh:hover { transform: translateY(-2px); box-shadow: 0 0 15px rgba(59, 130, 246, 0.6); }
        
        /* Excel 风格数据表 */
        .table-container { overflow-x: auto; background: rgba(30, 41, 59, 0.6); border-radius: 10px; border: 1px solid #334155; padding: 10px; }
        table { width: 100%; border-collapse: collapse; text-align: center; }
        th { background-color: #1e293b; color: #94a3b8; padding: 12px; border-bottom: 2px solid #38bdf8; font-size: 16px; white-space: nowrap;}
        td { padding: 12px 10px; border-bottom: 1px solid #334155; font-size: 16px; vertical-align: middle;}
        tr:hover { background-color: rgba(56, 189, 248, 0.1); }

        /* 表格内的输入框 */
        .edit-input { width: 90px; text-align: center; background-color: #0f172a; color: #8b5cf6; border: 1px solid #64748b; padding: 6px; border-radius: 4px; font-size: 18px; font-weight: bold;}
        .edit-input:focus { border-color: #8b5cf6; outline: none; box-shadow: 0 0 8px rgba(139, 92, 246, 0.6);}
        
        .edit-select { background-color: #0f172a; color: #fff; border: 1px solid #64748b; padding: 6px; border-radius: 4px; font-size: 15px; outline: none;}
        
        .btn-save { background: #10b981; padding: 6px 12px; margin-right: 5px; }
        .btn-delete { background: #ef4444; padding: 6px 12px; }
        .btn-save:hover, .btn-delete:hover { opacity: 0.8; }

        /* 授权画面 */
        #authOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #0b0f19; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .auth-box { background: rgba(30, 41, 59, 0.9); border: 2px solid #f472b6; padding: 40px; border-radius: 15px; text-align: center; box-shadow: 0 0 30px rgba(244, 114, 182, 0.3);}
        .auth-box h2 { color: #f472b6; margin-top: 0; }
        .auth-box input { font-size: 30px; letter-spacing: 10px; width: 150px; text-align: center; margin: 20px 0; }
        .auth-box button { font-size: 20px; padding: 10px 40px; width: 100%; background: #f472b6;}

        #noDataMsg { text-align: center; font-size: 20px; color: #64748b; margin-top: 50px; }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="auth-box">
            <h2>⚙️ 后台管理系统</h2>
            <p style="color: #94a3b8;">请输入超级管理员密码</p>
            <input type="password" id="adminPin" placeholder="****" maxlength="4">
            <br>
            <button onclick="verifyAdmin()">进入后台</button>
            <p id="pinError" style="color: #ef4444; display: none; margin-top: 15px; font-weight: bold;">❌ 密码错误</p>
        </div>
    </div>

    <div class="top-bar">
        <h1>⚙️ 数据修正与管理后台</h1>
        <div class="control-panel">
            <label>选择修改日期：</label>
            <input type="date" id="adminDate">
            <button class="btn-refresh" onclick="loadData()">🔄 载入 / 刷新表格</button>
        </div>
    </div>

    <div class="table-container">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>工厂-线别</th>
                    <th>品牌(单号)</th>
                    <th>运作时间</th>
                    <th>预期产量</th>
                    <th style="color: #8b5cf6;">实际产量 (可改)</th>
                    <th>达标率 (自动计算)</th>
                    <th style="color: #facc15;">生产状态 (可改)</th>
                    <th>最后更新</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
        <div id="noDataMsg">👈 请先选择日期并点击「载入表格」</div>
    </div>

    <script>
        // 🔐 管理者密码验证
        const ADMIN_PIN = "9999";
        function verifyAdmin() {
            if (document.getElementById('adminPin').value === ADMIN_PIN) {
                document.getElementById('authOverlay').style.display = 'none';
            } else {
                document.getElementById('pinError').style.display = 'block';
                document.getElementById('adminPin').value = '';
            }
        }
        document.getElementById('adminPin').addEventListener("keypress", (e) => { if (e.key === "Enter") verifyAdmin(); });

        // 1. Firebase 设定 (请确保与前两个档案的 Key 完全一致)
        const firebaseConfig = {
            apiKey: "AIzaSyDqZ1g_Rnb-qf0ij0Y53PyGJgzYoWDVeKk",
            authDomain: "factory-mes-2026.firebaseapp.com",
            databaseURL: "https://factory-mes-2026-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "factory-mes-2026",
            storageBucket: "factory-mes-2026.firebasestorage.app",
            messagingSenderId: "710873291817",
            appId: "1:710873291817:web:92ea2aadc4dd895fb19038"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentDateData = {}; // 暂存当前日期的数据结构

        window.onload = () => {
            let today = new Date();
            document.getElementById('adminDate').value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        };

        // 📥 载入数据 (注意：这里使用 .once 而不是 .on，防止你修改到一半画面自动刷新)
        function loadData() {
            let targetDate = document.getElementById('adminDate').value;
            const tbody = document.getElementById('tableBody');
            const noDataMsg = document.getElementById('noDataMsg');
            
            tbody.innerHTML = '';
            noDataMsg.style.display = 'block';
            noDataMsg.innerHTML = "⏳ 正在读取数据...";

            db.ref('production_data/' + targetDate).once('value').then((snapshot) => {
                if (!snapshot.exists()) {
                    noDataMsg.innerHTML = "📭 此日期没有生产数据。";
                    return;
                }
                
                noDataMsg.style.display = 'none';
                currentDateData = snapshot.val();
                
                // 将物件转为阵列并按厂线排序
                let linesArray = Object.keys(currentDateData).map(key => {
                    return { key: key, ...currentDateData[key] };
                });
                
                linesArray.sort((a, b) => a.key.localeCompare(b.key, undefined, {numeric: true}));

                linesArray.forEach(line => {
                    // 生成状态下拉选单
                    let statusOptions = `
                        <option value="RUNNING" ${line.status === 'RUNNING' ? 'selected' : ''}>🟢 运行中</option>
                        <option value="PAUSED" ${line.status === 'PAUSED' ? 'selected' : ''}>🟡 已暂停</option>
                        <option value="STOPPED" ${line.status === 'STOPPED' ? 'selected' : ''}>🔴 已结束</option>
                    `;

                    let tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="font-weight:bold;">${line.factory} - ${line.line}</td>
                        <td style="color:#38bdf8;">${line.brand}<br><small>(${line.order})</small></td>
                        <td>${(line.elapsedMins / 60).toFixed(2)} hr</td>
                        <td id="expected_${line.key}">${line.expectedOutput}</td>
                        
                        <td><input type="number" id="actual_${line.key}" class="edit-input" value="${line.actualOutput}" min="0"></td>
                        
                        <td id="rate_${line.key}" style="font-weight:bold;">${line.achievementRate.toFixed(1)}%</td>
                        
                        <td><select id="status_${line.key}" class="edit-select">${statusOptions}</select></td>
                        
                        <td style="font-size:12px; color:#64748b;">${line.lastUpdate}</td>
                        
                        <td>
                            <button class="btn-save" onclick="saveRow('${line.key}')">💾 储存</button>
                            <button class="btn-delete" onclick="deleteRow('${line.key}')">🗑️ 删除</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }).catch(err => {
                noDataMsg.innerHTML = "❌ 读取失败：" + err.message;
            });
        }

        // 💾 保存修改
        function saveRow(lineKey) {
            let targetDate = document.getElementById('adminDate').value;
            let newActual = parseInt(document.getElementById(`actual_${lineKey}`).value);
            let newStatus = document.getElementById(`status_${lineKey}`).value;
            
            if (isNaN(newActual) || newActual < 0) {
                alert("实际产量必须是大于等于 0 的数字！"); return;
            }

            // 重新计算达标率
            let expected = currentDateData[lineKey].expectedOutput;
            let newRate = 0;
            if (expected > 0) {
                newRate = (newActual / expected) * 100;
            }

            // 更新到 Firebase
            let updates = {
                actualOutput: newActual,
                achievementRate: newRate,
                status: newStatus,
                lastUpdate: new Date().toLocaleTimeString('zh-CN') + " (后台修正)"
            };

            db.ref(`production_data/${targetDate}/${lineKey}`).update(updates).then(() => {
                // UI 上更新达标率显示
                document.getElementById(`rate_${lineKey}`).innerText = newRate.toFixed(1) + "%";
                // 更新暂存数据
                currentDateData[lineKey].actualOutput = newActual;
                currentDateData[lineKey].achievementRate = newRate;
                currentDateData[lineKey].status = newStatus;
                
                alert(`✅ ${lineKey} 数据已成功修正！老板看板将立即同步。`);
            }).catch(err => {
                alert("❌ 保存失败：" + err.message);
            });
        }

        // 🗑️ 删除整行记录
        function deleteRow(lineKey) {
            if (confirm(`⚠️ 警告！你确定要完全删除【${lineKey}】在这一天的纪录吗？\n删除后将无法复原，且会在老板看板上消失！`)) {
                let targetDate = document.getElementById('adminDate').value;
                db.ref(`production_data/${targetDate}/${lineKey}`).remove().then(() => {
                    alert(`🗑️ ${lineKey} 纪录已删除。`);
                    loadData(); // 重新载入表格
                }).catch(err => alert("❌ 删除失败：" + err.message));
            }
        }
    </script>
</body>
</html>
